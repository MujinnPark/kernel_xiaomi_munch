name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Build script (build.sh = AOSP+MIUI dual zip; build-miui.sh = MIUI only)'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
        # NOTE: build-miui.sh removed — the Package zip step always extracts
        # from APTKernel_AOSP_*.zip regardless of which script ran.
        # MIUI/AOSP selection is handled at flash time via anykernel.sh ROM detection.
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify build started
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            LABEL="ReSukiSU+SUSFS"
          else
            LABEL="NoKSU"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=🔨 PitchKernel — Build Started%0ADevice: munch (Poco F4)%0AType: ${LABEL} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')" | jq '.ok'

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi \
            device-tree-compiler

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          # Bug fix: was github.run_id — unique per run, so cache was NEVER reused.
          # Now: exact hit on reruns of same commit; branch-level fallback for new commits.
          key: pitchkernel-ccache-munch-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            pitchkernel-ccache-munch-${{ github.ref_name }}-
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      - name: Set PitchKernel name
        run: |
          echo "-pitchkernel" > apasitu/localversion-st
          echo "" > apasitu/localversion-cip

      - name: Point AnyKernel3 to PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh

      - name: Patch defconfig
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          [ -f "$DEFCONFIG" ] || { echo "ERROR: $DEFCONFIG not found"; exit 1; }

          # --- Kernel name ---
          # Override AstideLabs' kernel name — defconfig sets CONFIG_LOCALVERSION="-aptusitu-perf"
          # which appends after our localversion-st, producing "-pitchkernel-aptusitu-perf-gXXX".
          # Replace with empty string so only localversion-st ("-pitchkernel") takes effect.
          sed -i 's/CONFIG_LOCALVERSION="-aptusitu-perf"/CONFIG_LOCALVERSION=""/' "$DEFCONFIG"

          # --- LOCALVERSION_AUTO ---
          # Drop the git hash suffix. Use scripts/config so the symbol is set exactly
          # once — avoids the "override: reassigning to symbol LOCALVERSION_AUTO" warning
          # that the old sed + append approach produced (symbol appeared twice in defconfig).
          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --disable LOCALVERSION_AUTO
          cd ..

          # --- uclamp disable (CRITICAL FIX) ---
          # Previous approach appended comment lines ("# CONFIG_UCLAMP_TASK is not set")
          # to the defconfig. Kconfig only honours that syntax in a fully-resolved .config,
          # NOT in a defconfig fragment — comments in defconfigs are ignored, so uclamp
          # was never actually disabled and the cpufreq scaling bug persisted every build.
          # scripts/config writes the correct active directive that Kconfig respects.
          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --disable UCLAMP_TASK \
            --disable UCLAMP_TASK_GROUP
          cd ..

          # --- TCP BBR + I/O scheduler ---
          # These are additive (not already in the base defconfig), so >> append is fine.
          #
          # I/O SCHEDULER NOTE: On this 4.19 SM8250 kernel, UFS (ufshcd) registers via
          # the SCSI subsystem. Android's init.qcom.rc (or fstab) often resets the scheduler
          # to cfq at boot via sysfs write. Two-layer fix:
          #   1. Defconfig: enable mq-deadline for blk-mq path AND legacy deadline for SCSI path.
          #   2. Runtime: pitchkernel_cpufreq.sh writes scheduler to sysfs on every boot.
          #   Without the runtime write, init.rc wins and CFQ takes over.
          {
            echo ""
            echo "# TCP congestion control - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_TCP_CONG_WESTWOOD=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr"'
            echo ""
            echo "# I/O scheduler — mq-deadline for blk-mq path (UFS via ufshcd)"
            echo "# Also enable legacy IOSCHED_DEADLINE for SCSI single-queue fallback"
            echo "# Runtime enforcement in pitchkernel_cpufreq.sh overrides init.rc CFQ reset"
            echo "CONFIG_MQ_IOSCHED_DEADLINE=y"
            echo "CONFIG_IOSCHED_DEADLINE=y"
            echo 'CONFIG_DEFAULT_IOSCHED="mq-deadline"'
          } >> "$DEFCONFIG"

          echo "Patched defconfig (tail -20):"
          tail -20 "$DEFCONFIG"
          echo ""
          echo "Verifying uclamp directives written by scripts/config:"
          grep -E "UCLAMP_TASK|LOCALVERSION_AUTO" "$DEFCONFIG" || echo "WARNING: grep found nothing — check scripts/config output above"

      - name: Build kernel
        env:
          # Bug fix: empty timestamp prevents __DATE__/__TIME__ macros from
          # generating unique hashes on every build, which killed ccache hit rate.
          KBUILD_BUILD_TIMESTAMP: ''
          KBUILD_BUILD_USER: pitchkernel
          KBUILD_BUILD_HOST: github-actions
          # Bug fix: explicit CCACHE_DIR matches the cache action path above.
          CCACHE_DIR: ~/.cache/ccache_mikernel
          CCACHE_MAXSIZE: 5G
          CCACHE_COMPRESS: '1'
          CCACHE_COMPRESSLEVEL: '1'
          # time_macros: ignore __DATE__/__TIME__ differences (the key fix for kernels).
          # file_stat_matches: use stat instead of mtime for file change detection.
          # locale: ignore locale differences between runs.
          CCACHE_SLOPPINESS: file_stat_matches,locale,time_macros
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: Fix ak3-core.sh in built anykernel dir
        run: |
          # build.sh clones MujinnPark/AnyKernel3 during Build kernel step.
          # That fork has ak3-core.sh truncated at 535 lines (missing 431 lines).
          # This causes "syntax error: unexpected end of file" on device at flash time.
          # Fix: overwrite with the complete upstream file right after build completes.
          TARGET="apasitu/anykernel/tools/ak3-core.sh"
          [ -f "$TARGET" ] || { echo "ERROR: $TARGET not found — build may have failed"; exit 1; }
          curl -fsSL "https://raw.githubusercontent.com/osm0sis/AnyKernel3/master/tools/ak3-core.sh" \
            -o "$TARGET"
          LINES=$(wc -l < "$TARGET")
          echo "ak3-core.sh lines after fix: $LINES"
          [ "$LINES" -gt 900 ] || { echo "ERROR: still truncated ($LINES lines)"; exit 1; }

      - name: Overlay PitchKernel AnyKernel3 files
        run: |
          # CRITICAL BUG FIX: build.sh clones MujinnPark/AnyKernel3 and uses whatever
          # anykernel.sh and patch/ files are in THAT repo. Our customized anykernel.sh
          # (ROM detection, Image move fix, cpufreq script install) and
          # patch/pitchkernel_cpufreq.sh are stored in THIS repo under PitchKernel/anykernel/.
          # Without this overlay step, all our anykernel.sh work is silently dead code.
          AK3_BUILT="apasitu/anykernel"
          AK3_OURS="PitchKernel/anykernel"
          [ -d "$AK3_BUILT" ] || { echo "ERROR: $AK3_BUILT not found — build failed"; exit 1; }
          [ -d "$AK3_OURS"  ] || { echo "ERROR: $AK3_OURS not found — missing from repo"; exit 1; }

          echo "Overlaying PitchKernel anykernel files over cloned MujinnPark/AnyKernel3..."
          cp -v "$AK3_OURS/anykernel.sh" "$AK3_BUILT/anykernel.sh"
          mkdir -p "$AK3_BUILT/patch"
          cp -v "$AK3_OURS/patch/pitchkernel_cpufreq.sh" "$AK3_BUILT/patch/pitchkernel_cpufreq.sh"
          chmod 755 "$AK3_BUILT/patch/pitchkernel_cpufreq.sh"

          echo "Verifying overlaid files:"
          grep -m1 "PitchKernel by Mujinn" "$AK3_BUILT/anykernel.sh" \
            || { echo "ERROR: anykernel.sh does not look like our version"; exit 1; }
          grep -m1 "PitchKernel" "$AK3_BUILT/patch/pitchkernel_cpufreq.sh" \
            || { echo "ERROR: pitchkernel_cpufreq.sh missing expected content"; exit 1; }
          echo "Overlay complete."

      - name: Package zip
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV

          # Get build.sh's own AOSP zip — captured before the MIUI section
          # wipes anykernel/kernels/aosp/. Targeting by exact name pattern
          # avoids accidentally picking the MIUI zip.
          AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "APTKernel_AOSP_*.zip" | head -1)
          if [ -z "$AOSP_SRC_ZIP" ] || [ ! -f "$AOSP_SRC_ZIP" ]; then
            echo "ERROR: APTKernel_AOSP_*.zip not found. Available zips:"
            find apasitu -maxdepth 1 -name "*.zip"
            exit 1
          fi
          echo "AOSP source: $AOSP_SRC_ZIP ($(du -sh $AOSP_SRC_ZIP | cut -f1))"

          # Extract kernel files from the AOSP zip
          mkdir -p /tmp/kernel_files
          unzip -q -j "$AOSP_SRC_ZIP" \
            "kernels/aosp/Image" \
            "kernels/aosp/dtb" \
            "kernels/aosp/dtbo.img" \
            -d /tmp/kernel_files/

          for f in Image dtb dtbo.img; do
            if [ ! -f "/tmp/kernel_files/$f" ]; then
              echo "ERROR: $f not found in $AOSP_SRC_ZIP"
              unzip -l "$AOSP_SRC_ZIP" | grep kernels
              exit 1
            fi
          done
          echo "Kernel files:"
          ls -lh /tmp/kernel_files/

          # AnyKernel3 base from the post-build anykernel/ dir.
          # Tools, scripts, patch/ files are intact — only kernels/ got
          # wiped by the MIUI build section.
          AK3_DIR="apasitu/anykernel"
          [ -d "$AK3_DIR" ] || { echo "ERROR: $AK3_DIR not found"; ls apasitu/; exit 1; }

          WORKDIR="/tmp/ak3_build"
          rm -rf "$WORKDIR"
          cp -r "$AK3_DIR" "$WORKDIR"

          # Inject real AOSP kernel files
          rm -rf "$WORKDIR/kernels"
          mkdir -p "$WORKDIR/kernels/aosp"
          cp /tmp/kernel_files/Image   "$WORKDIR/kernels/aosp/"
          cp /tmp/kernel_files/dtb     "$WORKDIR/kernels/aosp/"
          cp /tmp/kernel_files/dtbo.img "$WORKDIR/kernels/aosp/"

          # Verify Image landed
          [ -f "$WORKDIR/kernels/aosp/Image" ] || \
            { echo "ERROR: Image missing after copy"; exit 1; }

          # Ship dtbo as both AOSP and MIUI entries so the ROM selector
          # in anykernel.sh can rename the correct one. Both use the same
          # compiled dtbo — MIUI vs AOSP dtbo difference is only relevant
          # if the MIUI build target is used (build-miui.sh).
          cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-aosp-dtbo.img"
          cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-miui-dtbo.img"

          ZIP_NAME="PitchKernel-${TYPE}-munch-${DATE}.zip"

          cd "$WORKDIR"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . \
            -x ".git/*" -x "*.gitignore" >/dev/null

          # Verify Image is actually inside the final zip
          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME" | grep -q "kernels/aosp/Image" || \
            { echo "ERROR: kernels/aosp/Image missing from $ZIP_NAME"; exit 1; }

          cd "$GITHUB_WORKSPACE"
          echo "Packaged: $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 7

      - name: Send artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
          ZIP_PATH: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
          KERNEL_VERSION: "4.19"
          ROOT_SOLUTION: ${{ inputs.ksu && 'RESUKISU' || 'VANILLA' }}
          SUSFS_ENABLED: ${{ inputs.ksu }}
          KERNEL_BRANCH: "default (apasitu)"
          COMPILER_STRING: "ZyCromerZ Clang 16.0.6"
          KERNEL_SRC: "apasitu"
        run: |
          source PitchKernel/release/telegram.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS (${{ inputs.ksu && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - ROM auto-detection: MIUI/HyperOS or AOSP
            - CPU prime core ceiling: 2841600 kHz (hardware-enforced by qcom-cpufreq-hw driver)

            ### Installation
            Flash via OrangeFox or TWRP.
            Select ROM type during flash (auto-detected from zip name, volume-key fallback).
            cpufreq script placed in `/data/adb/post-fs-data.d/` automatically — no separate module needed.
          files: ${{ env.ZIP_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false





          
