name: 🔨 Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build type'
        required: true
        default: 'sukisu'
        type: choice
        options:
          - sukisu
          - noksu
  push:
    tags:
      - 'v*'

env:
  KERNEL_SOURCE: https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git
  KERNEL_BRANCH: android16-aptusitu-new
  DEVICE: munch
  BASE_DEFCONFIG: vendor/kona_defconfig
  DEVICE_FRAGMENT: vendor/xiaomi/munch.config
  KERNEL_NAME: PitchKernel
  ANYKERNEL_SOURCE: https://github.com/kvsnr113/AnyKernel3.git
  ANYKERNEL_BRANCH: main
  # ZyCromerZ Clang 16 — same toolchain apasitu author uses (confirmed from their README)
  CLANG_URL: https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz
  TZ: UTC

jobs:
  build:
    name: Build PitchKernel — munch (SM8250)
    runs-on: ubuntu-22.04

    steps:
      - name: 📂 Checkout PitchKernel repo
        uses: actions/checkout@v6

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex \
            git libssl-dev libelf-dev lz4 make \
            python3 python-is-python3 \
            unzip wget zip zstd ccache libarchive-tools

      - name: 🕒 Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 🔧 Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          max-size: 5G
          key: pitchkernel-munch

      - name: 🛠️ Setup ZyCromerZ Clang 16
        run: |
          mkdir -p zyc-clang
          wget -q --show-progress -O zyc-clang.tar.gz "${{ env.CLANG_URL }}"
          tar -zxf zyc-clang.tar.gz -C zyc-clang
          rm zyc-clang.tar.gz
          echo "CLANG_PATH=$(pwd)/zyc-clang/bin" >> $GITHUB_ENV
          echo "✅ $($(pwd)/zyc-clang/bin/clang --version | head -1)"

      - name: 🧬 Clone kernel source (AstideLabs/apasitu)
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} \
            kernel_source
          cd kernel_source
          echo "KERNEL_VERSION=$(make kernelversion)" >> $GITHUB_ENV

      - name: 🔍 Verify config fragments
        run: |
          BASE="kernel_source/arch/arm64/configs/${{ env.BASE_DEFCONFIG }}"
          FRAG="kernel_source/arch/arm64/configs/${{ env.DEVICE_FRAGMENT }}"
          [ -f "$BASE" ] || { echo "❌ Missing: $BASE"; exit 1; }
          [ -f "$FRAG" ] || { echo "❌ Missing: $FRAG"; exit 1; }
          echo "✅ Base:     ${{ env.BASE_DEFCONFIG }}"
          echo "✅ Fragment: ${{ env.DEVICE_FRAGMENT }}"

      - name: 📥 Clone AnyKernel3 + inject anykernel.sh
        run: |
          git clone --depth=1 \
            -b ${{ env.ANYKERNEL_BRANCH }} \
            ${{ env.ANYKERNEL_SOURCE }} \
            AnyKernel3

          # Write PitchKernel anykernel.sh directly — no file dependency
          cat > AnyKernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 — PitchKernel for Poco F4 / Redmi K40S (munch)
          # Frequency data verified from Lime kernel DTB binary analysis
          properties() { '
          kernel.string=PitchKernel by PitchDev
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=munch
          device.name2=POCO F4
          device.name3=Redmi K40S
          device.name4=22021211RC
          device.name5=22021211RG
          supported.versions=11-16
          supported.patchlevels=
          '; }

          BLOCK=boot;
          IS_SLOT_DEVICE=auto;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;
          NO_BLOCK_DISPLAY=1;

          . tools/ak3-core.sh;

          PROFILE_FILE=/data/.pitchkernel_freq_profile
          POSTBOOT_DIR=/data/adb/post-fs-data.d
          POSTBOOT_SCRIPT=$POSTBOOT_DIR/pitchkernel_freq.sh

          ui_print " "
          ui_print "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ui_print "       ⚡  P I T C H K E R N E L  ⚡"
          ui_print "    Poco F4 / Redmi K40S  (munch)"
          ui_print "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ui_print " "
          ui_print "  Vol+ = YES      Vol- = NO"
          ui_print " "

          ui_print "  [ OC ] Overclock"
          ui_print "    Silver: 1804 MHz | Gold: 3000 MHz | Prime: 3072 MHz"
          ui_print "  Apply OVERCLOCK? (Vol+/Vol-)"
          if choose; then
              echo "overclock" > $PROFILE_FILE
              ui_print "  ✓ OVERCLOCK selected"
          else

          ui_print "  [ ST ] Stable"
          ui_print "    Silver: 1804 MHz | Gold: 2419 MHz | Prime: 2841 MHz"
          ui_print "  Apply STABLE? (Vol+/Vol-)"
          if choose; then
              echo "stable" > $PROFILE_FILE
              ui_print "  ✓ STABLE selected"
          else

          ui_print "  [ BAT ] Battery"
          ui_print "    Silver: 1516 MHz | Gold: 1804 MHz | Prime: 2419 MHz"
          ui_print "  Apply BATTERY? (Vol+/Vol-)"
          if choose; then
              echo "battery" > $PROFILE_FILE
              ui_print "  ✓ BATTERY selected"
          else
              echo "stable" > $PROFILE_FILE
              ui_print "  ℹ Defaulting to STABLE"
          fi; fi; fi

          mkdir -p $POSTBOOT_DIR 2>/dev/null
          cat > $POSTBOOT_SCRIPT << SCRIPT_EOF
          #!/system/bin/sh
          PROFILE=\$(cat /data/.pitchkernel_freq_profile 2>/dev/null || echo "stable")
          set_freq() { [ -f "\$1" ] && echo "\$2" > "\$1"; }
          case "\$PROFILE" in
            overclock) SILVER=1804800; GOLD=3000000; PRIME=3072000 ;;
            battery)   SILVER=1516800; GOLD=1804800; PRIME=2419200 ;;
            *)         SILVER=1804800; GOLD=2419200; PRIME=2841600 ;;
          esac
          for cpu in 0 1 2 3; do set_freq /sys/devices/system/cpu/cpu\${cpu}/cpufreq/scaling_max_freq \$SILVER; done
          for cpu in 4 5 6;   do set_freq /sys/devices/system/cpu/cpu\${cpu}/cpufreq/scaling_max_freq \$GOLD;   done
          set_freq /sys/devices/system/cpu/cpu7/cpufreq/scaling_max_freq \$PRIME
          SCRIPT_EOF
          chmod 755 $POSTBOOT_SCRIPT

          dump_boot;
          write_boot;

          ui_print " "
          ui_print "  PitchKernel installed! Profile: $(cat $PROFILE_FILE)"
          ui_print "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          AKEOF

      - name: 🔨 Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC="ccache clang"
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabihf-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export KBUILD_BUILD_USER=PitchDev
          export KBUILD_BUILD_HOST=PitchKernel

          cd kernel_source
          mkdir -p out

          echo "⚙️ Step 1: Base config..."
          make O=out ARCH=arm64 ${{ env.BASE_DEFCONFIG }}

          echo "⚙️ Step 2: Merge munch fragment..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/${{ env.DEVICE_FRAGMENT }}

          echo "⚙️ Step 3: Resolve symbols..."
          make O=out ARCH=arm64 olddefconfig

          echo "⚙️ Step 4: Set localversion..."
          ./scripts/config --file out/.config \
            --set-str LOCALVERSION "-PitchKernel-munch"

          echo "🔨 Building ($(nproc) threads)..."
          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            2>&1 | tee ../build.log

          [ -f out/arch/arm64/boot/Image ] || \
            { echo "❌ Build failed"; exit 1; }
          echo "✅ Build successful"

      - name: 📦 Package flashable zip
        run: |
          BUILD_TYPE="${{ github.event.inputs.BUILD_TYPE || 'sukisu' }}"
          ZIP_NAME="${{ env.KERNEL_NAME }}-${BUILD_TYPE}-munch-${{ env.BUILD_DATE }}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          cp kernel_source/out/arch/arm64/boot/Image AnyKernel3/
          [ -f kernel_source/out/arch/arm64/boot/dtbo.img ] && \
            cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f kernel_source/out/arch/arm64/boot/dtb ] && \
            cp kernel_source/out/arch/arm64/boot/dtb AnyKernel3/

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "README.md"
          cd ..
          echo "📦 $(du -sh ${ZIP_NAME})"

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ZIP_NAME }}
            build.log
          retention-days: 7

      - name: 🚀 Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.ZIP_NAME }},build.log
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "PitchKernel ${{ github.ref_name }} — munch"
          body: |
            ## ⚡ PitchKernel ${{ github.ref_name }}
            **Device:** Poco F4 / Redmi K40S (munch) — SM8250
            **Kernel:** ${{ env.KERNEL_VERSION }}-PitchKernel-munch
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250 @ `android16-aptusitu-new`
            **Config:** vendor/kona_defconfig + vendor/xiaomi/munch.config
            **Toolchain:** ZyCromerZ Clang 16.0.6
            **Type:** ${{ github.event.inputs.BUILD_TYPE || 'sukisu' }}

            ### CPU Frequency Profiles (selected during flash)
            | Profile | Silver cpu0-3 | Gold cpu4-6 | Prime cpu7 |
            |---|---|---|---|
            | Overclock | 1804 MHz | 3000 MHz | 3072 MHz |
            | Stable | 1804 MHz | 2419 MHz | 2841 MHz |
            | Battery | 1516 MHz | 1804 MHz | 2419 MHz |

            ### Root: sukisu = ReSukiSU + SUSFS | noksu = Magisk / APatch
            ### Flash via TWRP or OrangeFox. Android 11–16.
          draft: false
          prerelease: false
          
