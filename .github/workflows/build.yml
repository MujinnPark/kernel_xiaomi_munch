name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Target ROM type'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      # BUG #2 FIX: checkout first so workspace exists before notify
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # BUG #1 FIX: use shell if/else, not GHA && ternary (boolean inputs
      # don't work with && in -d strings)
      - name: Notify build started
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            BUILD_TYPE_LABEL="ReSukiSU+SUSFS"
          else
            BUILD_TYPE_LABEL="NoKSU"
          fi
          TEXT="🔨 PitchKernel — Build Started%0ADevice: munch (Poco F4)%0AType: ${BUILD_TYPE_LABEL} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=${TEXT}" | jq '.ok'

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      # BUG #10 FIX: override apasitu's localversion so kernel string shows
      # "pitchkernel" not "aptusitu". apasitu reads localversion-st at build
      # time and appends it to LOCALVERSION.
      - name: Set PitchKernel name
        run: |
          echo "-pitchkernel" > apasitu/localversion-st
          echo "-pitchkernel" > apasitu/localversion-cip
          cat apasitu/localversion-st

      - name: Point AnyKernel3 clone at PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh
          grep -n "AnyKernel3" apasitu/build.sh | head -3

      - name: Enable TCP BBR for munch
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          [ -f "$DEFCONFIG" ] || { echo "ERROR: $DEFCONFIG not found"; exit 1; }
          {
            echo ""
            echo "# TCP BBR - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_DEFAULT_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
          } >> "$DEFCONFIG"

      - name: Build kernel
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: Verify BBR compiled in
        run: |
          CONFIG_FILE=$(find apasitu -maxdepth 3 -name ".config" | head -1)
          [ -f "$CONFIG_FILE" ] || { echo "ERROR: .config not found"; exit 1; }
          grep -q '^CONFIG_TCP_CONG_BBR=y' "$CONFIG_FILE" || \
            { echo "ERROR: BBR not in .config"; exit 1; }
          grep -q '^CONFIG_DEFAULT_TCP_CONG="bbr"' "$CONFIG_FILE" || \
            { echo "ERROR: BBR not default"; grep 'DEFAULT_TCP_CONG' "$CONFIG_FILE"; exit 1; }
          echo "BBR confirmed in .config"

      # BUG #3 FIX: don't assume APTKernel_AOSP_* naming — find whatever
      # zip build.sh actually produced
      # BUG #7 & #8 FIX: drop ramdisk injection entirely (fails on boot
      # header v3). Instead anykernel.sh writes /data/.pitchkernel_profile
      # and a KSU module applies it at boot. Two separate zips (Stable /
      # Overclock) are produced by substituting PROFILE_FIXED placeholder.
      - name: Package Stable and Overclock zips
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV

          # Find AOSP zip — pick the first one, whatever it's named
          AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "*.zip" | grep -i "aosp\|AOSP" | head -1)
          if [ -z "$AOSP_SRC_ZIP" ] || [ ! -f "$AOSP_SRC_ZIP" ]; then
            # fallback: any zip in apasitu root
            AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "*.zip" | head -1)
          fi
          [ -f "$AOSP_SRC_ZIP" ] || { echo "ERROR: no zip found in apasitu/"; ls apasitu/*.zip 2>/dev/null || true; exit 1; }
          echo "Using source zip: $AOSP_SRC_ZIP"

          AK3_DIR="apasitu/anykernel"
          [ -d "$AK3_DIR" ] || { echo "ERROR: $AK3_DIR not found"; exit 1; }

          # Extract kernel files from build.sh's own zip
          mkdir -p /tmp/aosp_kernel_extract
          unzip -q -j "$AOSP_SRC_ZIP" "kernels/aosp/Image" "kernels/aosp/dtb" "kernels/aosp/dtbo.img" \
            -d /tmp/aosp_kernel_extract || \
            { echo "ERROR: failed to extract kernel files from $AOSP_SRC_ZIP"; unzip -l "$AOSP_SRC_ZIP" | head -20; exit 1; }
          ls -lh /tmp/aosp_kernel_extract/

          for profile in stable overclock; do
            WORKDIR="/tmp/ak3_${profile}"
            rm -rf "$WORKDIR"
            cp -r "$AK3_DIR" "$WORKDIR"

            rm -rf "$WORKDIR/kernels"
            mkdir -p "$WORKDIR/kernels/aosp"
            cp /tmp/aosp_kernel_extract/Image "$WORKDIR/kernels/aosp/"
            cp /tmp/aosp_kernel_extract/dtb "$WORKDIR/kernels/aosp/"
            cp /tmp/aosp_kernel_extract/dtbo.img "$WORKDIR/kernels/aosp/"

            # BUG #4 FIX: verified placeholder string matches anykernel.sh exactly
            grep -q 'variant="PROFILE_FIXED";' "$WORKDIR/anykernel.sh" || \
              { echo "ERROR: PROFILE_FIXED placeholder not found in anykernel.sh — update fork"; exit 1; }
            sed -i "s/variant=\"PROFILE_FIXED\";/variant=\"${profile}\";/" "$WORKDIR/anykernel.sh"
            echo "[$profile] variant set: $(grep 'variant=' "$WORKDIR/anykernel.sh" | head -1)"

            if [ "$profile" = "stable" ]; then
              ZIP_NAME="PitchKernel-${TYPE}-munch-Stable-${DATE}.zip"
            else
              ZIP_NAME="PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip"
            fi

            cd "$WORKDIR"
            zip -r9 "$ZIP_NAME" ./* -x "*.git*" "*.gitignore*" "*.zip" >/dev/null
            unzip -l "$ZIP_NAME" | grep -q "kernels/aosp/Image" || \
              { echo "ERROR: kernels/aosp/Image missing from $ZIP_NAME"; exit 1; }
            mv "$ZIP_NAME" "$GITHUB_WORKSPACE/"
            cd "$GITHUB_WORKSPACE"
            echo "Packaged: $ZIP_NAME"
          done

          ls -lh *.zip
          echo "STABLE_ZIP=PitchKernel-${TYPE}-munch-Stable-${DATE}.zip" >> $GITHUB_ENV
          echo "OC_ZIP=PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ./*.zip
          if-no-files-found: error
          retention-days: 7

      # BUG #5 FIX: set ROOT_SOLUTION and SUSFS_ENABLED via shell if/else
      # not GHA boolean ternary expression (which silently resolves wrong)
      - name: Send Stable artifact to Telegram
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            export ROOT_SOLUTION="RESUKISU"
            export SUSFS_ENABLED="true"
          else
            export ROOT_SOLUTION="VANILLA"
            export SUSFS_ENABLED="false"
          fi
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export TELEGRAM_THREAD_ID_ARTIFACT="${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}"
          export ZIP_PATH="${{ github.workspace }}/${{ env.STABLE_ZIP }}"
          export ZIP_NAME="${{ env.STABLE_ZIP }}"
          export KERNEL_VERSION="4.19"
          export KERNEL_BRANCH="default (apasitu)"
          export COMPILER_STRING="ZyCromerZ Clang 16.0.6"
          export KERNEL_SRC="${{ github.workspace }}/apasitu"
          source PitchKernel/release/telegram.sh

      - name: Send Overclock artifact to Telegram
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            export ROOT_SOLUTION="RESUKISU"
            export SUSFS_ENABLED="true"
          else
            export ROOT_SOLUTION="VANILLA"
            export SUSFS_ENABLED="false"
          fi
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export TELEGRAM_THREAD_ID_ARTIFACT="${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}"
          export ZIP_PATH="${{ github.workspace }}/${{ env.OC_ZIP }}"
          export ZIP_NAME="${{ env.OC_ZIP }}"
          export KERNEL_VERSION="4.19"
          export KERNEL_BRANCH="default (apasitu)"
          export COMPILER_STRING="ZyCromerZ Clang 16.0.6"
          export KERNEL_SRC="${{ github.workspace }}/apasitu"
          source PitchKernel/release/telegram.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS (${{ inputs.ksu == true && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - Auto-detects AOSP / MIUI at flash time
            - Two variants: Stable (cpu7 max 2841MHz) | Overclock (cpu7 max 3187MHz)

            ### CPU Frequency
            | Variant | Prime cpu7 |
            |---|---|
            | Stable | 2841 MHz |
            | Overclock | 3187 MHz |

            ### Installation
            Flash the variant zip via TWRP or OrangeFox. Supports Android 11-16.
          files: ./*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
