name: Notify

on:
  push:
  workflow_run:
    workflows: ["Build PitchKernel"]
    types: [completed]

jobs:

  # ======================================================
  # PUSH EVENT — commit notification
  # ======================================================
  on-push:
    name: "Push Notify"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Notify Push
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
          COMMIT:   ${{ github.sha }}
          BRANCH:   ${{ github.ref_name }}
          MESSAGE:  ${{ github.event.head_commit.message }}
          AUTHOR:   ${{ github.event.head_commit.author.name }}
          URL:      ${{ github.event.head_commit.url }}
        run: |
          SHORT_COMMIT="${COMMIT:0:7}"
          TITLE=$(printf '%s' "$MESSAGE" | head -1)
          BODY=$(printf '%s' "$MESSAGE" | tail -n +3)

          TEXT=$(printf '📌 <b>PitchKernel</b> — New Commit\n<a href="%s">%s</a> on <code>%s</code>\nBy: %s\n\n<i>%s</i>' \
            "$URL" "$SHORT_COMMIT" "$BRANCH" "$AUTHOR" "$TITLE")

          if [ -n "$BODY" ]; then
            TEXT=$(printf '%s\n\n<pre>%s</pre>' "$TEXT" "$BODY")
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}")
          echo "$RESPONSE" | grep -q '"ok":true' \
            && echo "Notify sent" \
            || echo "Notify failed: $RESPONSE"

  # ======================================================
  # BUILD COMPLETE — result notification
  # ======================================================
  on-build:
    name: "Build Notify"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'

    steps:
      - name: Notify Build Result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_ID:     ${{ github.event.workflow_run.id }}
          RUN_NAME:   ${{ github.event.workflow_run.name }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}"

          if [ "$CONCLUSION" = "success" ]; then
            ICON="✅"
            STATUS="Build Succeeded"
          else
            ICON="❌"
            STATUS="Build Failed"
          fi

          TEXT=$(printf '%s <b>PitchKernel</b> — %s\nDevice: <code>munch (Poco F4)</code>\nDate: %s\n\n<a href="%s">View Run</a>' \
            "$ICON" "$STATUS" "$(date +'%Y-%m-%d %H:%M UTC')" "$RUN_URL")

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}")
          echo "$RESPONSE" | grep -q '"ok":true' \
            && echo "Notify sent" \
            || echo "Notify failed: $RESPONSE"
            
