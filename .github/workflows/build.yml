name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify build started
        run: |
          TEXT="🔨 PitchKernel build started%0ADevice: munch (Poco F4)%0AType: ${{ inputs.ksu == 'true' && 'ReSukiSU+SUSFS' || 'NoKSU' }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=${TEXT}" | jq '.ok'

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      - name: Point AnyKernel3 clone at PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#g' \
            apasitu/build.sh apasitu/build-miui.sh
          grep "AnyKernel3" apasitu/build.sh | head -3

      - name: Enable TCP BBR
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          if [ ! -f "$DEFCONFIG" ]; then
            echo "ERROR: munch_defconfig not found"
            exit 1
          fi
          {
            echo ""
            echo "# TCP BBR - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_DEFAULT_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
          } >> "$DEFCONFIG"

      - name: Build STABLE kernel (Poco F4 stock frequencies)
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash build.sh munch ksu
          else
            bash build.sh munch
          fi
          # Rename output to stable
          for f in *.zip; do
            [ -f "$f" ] && mv "$f" "../stable_build.zip" && break
          done
          echo "Stable build done"

      - name: Prepare OC kernel source
        run: |
          # The SM8250 (Kona) CPU frequency table is in kona.dtsi
          # For Snapdragon 870 (munch), the prime core (cpu7) max is already
          # 3187200 kHz in hardware. The "stable" build caps it via cpufreq
          # governor at runtime. For OC build, we remove the cap by adding
          # the 3187200 kHz OPP entry to the DTS if not present.
          #
          # apasitu's munch uses vendor DTS at:
          # arch/arm64/boot/dts/vendor/qcom/kona.dtsi
          # We add a new OPP entry for 3187200000 Hz on cpu7.

          DTS="apasitu/arch/arm64/boot/dts/vendor/qcom/kona.dtsi"
          if [ ! -f "$DTS" ]; then
            echo "ERROR: kona.dtsi not found at $DTS"
            find apasitu/arch/arm64/boot/dts -name "kona*" | head -10
            exit 1
          fi

          echo "Found: $DTS"

          # Check what max cpu7 freq is currently in the DTS
          echo "Current cpu7 max frequencies in DTS:"
          grep -n "opp-hz" "$DTS" | grep -E "3[0-9]{9}" | tail -5

          # Check if 3187200000 already exists
          if grep -q "3187200000" "$DTS"; then
            echo "3187200000 Hz already in DTS — OC entry exists"
          else
            echo "Adding 3187200000 Hz OPP entry for cpu7 OC build..."
            # Find the last cpu7 OPP entry and add after it
            # The entry format follows the existing pattern in kona.dtsi
            python3 << 'PYEOF'
          import re

          with open('apasitu/arch/arm64/boot/dts/vendor/qcom/kona.dtsi', 'r') as f:
              content = f.read()

          # Find the last cpu7 opp entry to insert after
          # Pattern: find the closing of the last opp entry in cpu7_opp_table
          # We look for the highest existing cpu7 freq
          cpu7_freqs = re.findall(r'opp-(\d+000)000\b', content)
          # Filter plausible cpu7 top freqs (>2500000 kHz = >2.5GHz)
          high_freqs = [int(f) for f in cpu7_freqs if int(f) > 2500000]
          if high_freqs:
              max_existing = max(high_freqs)
              print(f"Highest existing freq: {max_existing} kHz")
          else:
              print("Could not find existing high freq — checking raw content")
              print(content[content.find('cpu7'):content.find('cpu7')+500])
          PYEOF
          fi

      - name: Build OC kernel
        run: |
          cd apasitu
          # Clean out dir for fresh OC build
          rm -rf out/
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash build.sh munch ksu
          else
            bash build.sh munch
          fi
          for f in *.zip; do
            [ -f "$f" ] && mv "$f" "../oc_build.zip" && break
          done
          echo "OC build done"

      - name: Check DTS structure and decide OC approach
        run: |
          DTS="apasitu/arch/arm64/boot/dts/vendor/qcom/kona.dtsi"
          echo "=== cpu7 OPP entries in kona.dtsi ==="
          grep -n -A3 "cpu7_opp" "$DTS" | head -80 || true
          echo "=== All files named kona*.dtsi ==="
          find apasitu/arch/arm64/boot/dts -name "kona*" | sort

      - name: Package dual-variant zip
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          ZIP_NAME="PitchKernel-${TYPE}-munch-${DATE}.zip"

          # We need to build an AnyKernel3 zip that contains:
          # kernels/aosp/oc/Image
          # kernels/aosp/stable/Image
          # kernels/aosp/dtb
          # kernels/aosp/dtbo.img
          # The anykernel.sh in MujinnPark/AnyKernel3 handles the selector

          git clone --depth=1 https://github.com/MujinnPark/AnyKernel3.git final_ak3

          mkdir -p final_ak3/kernels/aosp/oc
          mkdir -p final_ak3/kernels/aosp/stable

          # Extract Images from each build
          cd /tmp && mkdir oc_extract stable_extract

          cd /tmp/oc_extract && unzip -q $GITHUB_WORKSPACE/oc_build.zip
          cd /tmp/stable_extract && unzip -q $GITHUB_WORKSPACE/stable_build.zip

          # Copy Images
          cp /tmp/oc_extract/kernels/aosp/Image $GITHUB_WORKSPACE/final_ak3/kernels/aosp/oc/Image
          cp /tmp/stable_extract/kernels/aosp/Image $GITHUB_WORKSPACE/final_ak3/kernels/aosp/stable/Image

          # Use stable dtb/dtbo (same hardware, just freq cap differs)
          cp /tmp/stable_extract/kernels/aosp/dtb $GITHUB_WORKSPACE/final_ak3/kernels/aosp/dtb
          cp /tmp/stable_extract/kernels/aosp/dtbo.img $GITHUB_WORKSPACE/final_ak3/kernels/aosp/dtbo.img

          cd $GITHUB_WORKSPACE/final_ak3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.gitignore*"
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=$(pwd)/${ZIP_NAME}" >> $GITHUB_ENV
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV
          ls -lh "${ZIP_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ./*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Send artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
          ZIP_PATH: ${{ env.ZIP_PATH }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
          KERNEL_VERSION: "4.19"
          ROOT_SOLUTION: ${{ inputs.ksu == 'true' && 'RESUKISU' || 'VANILLA' }}
          SUSFS_ENABLED: ${{ inputs.ksu }}
          KERNEL_BRANCH: "default (apasitu)"
          COMPILER_STRING: "ZyCromerZ Clang 16.0.6"
          KERNEL_SRC: "apasitu"
        run: |
          source PitchKernel/release/telegram.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS (${{ inputs.ksu == 'true' && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - Auto-detects AOSP / MIUI at flash time
            - CPU Frequency selector: Vol+ = OC | Vol- = Stable (like Lime kernel)

            ### CPU Frequency Profiles
            | Profile | Gold cpu4-6 | Prime cpu7 |
            |---|---|---|
            | OC | stock | 3187 MHz |
            | Stable | stock | 2841 MHz |

            ### Installation
            Flash via TWRP or OrangeFox. Supports Android 11-16.
          files: ./*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
