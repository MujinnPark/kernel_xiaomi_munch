name: 🔨 Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Build script (build.sh = AOSP ROMs, build-miui.sh = MIUI/HyperOS)'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: PitchKernel — munch (${{ inputs.script }}) (${{ inputs.ksu && 'ReSukiSU+SUSFS' || 'NoKSU' }})
    runs-on: ubuntu-latest

    steps:
      - name: 🧹 Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache python-is-python3

      - name: 🔧 Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-munch-${{ inputs.script }}-${{ github.run_id }}
          restore-keys: |
            pitchkernel-munch-${{ inputs.script }}-
            pitchkernel-munch-
            pitchkernel-

      - name: 🛠️ Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q -O /tmp/zyc-clang.tar.gz \
            https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz
          tar -zxf /tmp/zyc-clang.tar.gz -C $HOME/zyc-clang
          rm /tmp/zyc-clang.tar.gz
          echo "✅ Clang: $($HOME/zyc-clang/bin/clang --version | head -1)"

      - name: 🧬 Clone apasitu kernel source
        run: |
          git clone --depth=1 \
            -b android16-aptusitu-new \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            kernel_source
          ls kernel_source/build.sh kernel_source/build-miui.sh

      - name: ⚡ Enable TCP BBR
        run: |
          FRAG="kernel_source/arch/arm64/configs/vendor/xiaomi/munch.config"
          echo "" >> "$FRAG"
          echo "# TCP BBR — PitchKernel" >> "$FRAG"
          echo "CONFIG_TCP_CONG_BBR=y" >> "$FRAG"
          echo "CONFIG_NET_SCH_FQ=y" >> "$FRAG"
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> "$FRAG"
          echo "✅ BBR enabled"

      - name: 🔨 Build kernel
        run: |
          cd kernel_source
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: 📦 Rename zip to PitchKernel
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          TYPE=${{ inputs.ksu == 'true' && '"sukisu"' || '"noksu"' }}
          for f in kernel_source/*.zip; do
            [ -f "$f" ] && mv "$f" "PitchKernel-${TYPE}-munch-${DATE}.zip" && break
          done
          ls *.zip || { echo "❌ No zip found in kernel_source/"; ls kernel_source/; exit 1; }

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ./*.zip
          if-no-files-found: error
          retention-days: 7
          
