name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Target ROM type'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      - name: Notify build started
        run: |
          TEXT="🔨 <b>PitchKernel</b> — Build Started%0ADevice: munch (Poco F4)%0AType: ${{ inputs.ksu && 'ReSukiSU+SUSFS' || 'NoKSU' }} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=${TEXT}" | jq '.ok'

      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      # build.sh unconditionally `rm -rf anykernel/` then clones
      # AstideLabs/AnyKernel3 fresh on every run — there is no hook to inject
      # files into that directory after the fact, since zipping happens
      # inside build.sh itself. So instead we redirect the clone URL to a
      # fork (MujinnPark/AnyKernel3) containing the CPU profile selector
      # changes. This sed only touches the clone line, nothing else in
      # build.sh / build-miui.sh.
      - name: Point AnyKernel3 clone at PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh
          grep -n "AnyKernel3" apasitu/build.sh apasitu/build-miui.sh

      # FIXED (verified by actually running `make munch_defconfig` against this
      # source, not just read): two separate bugs existed.
      #   1. Previous version patched arch/arm64/configs/vendor/xiaomi/munch.config,
      #      a fragment never read by build.sh/build-miui.sh. Both run
      #      `make ${TARGET_DEVICE}_defconfig` -> arch/arm64/configs/munch_defconfig.
      #      That file had zero CONFIG_TCP_CONG_* entries, so BBR never compiled in.
      #   2. CONFIG_DEFAULT_TCP_CONG="bbr" as a direct string assignment does NOT
      #      work in this Kconfig tree (net/ipv4/Kconfig) — it's a derived string
      #      driven by a `choice` block. Setting the string directly gets silently
      #      overwritten by Kconfig's `default "cubic"` fallback. The actual symbol
      #      that must be set is CONFIG_DEFAULT_BBR=y, confirmed by running
      #      `make munch_defconfig` locally and inspecting the resolved .config:
      #      with only the string set, .config showed CONFIG_DEFAULT_TCP_CONG="cubic"
      #      despite BBR being compiled in (available but not default). Adding
      #      CONFIG_DEFAULT_BBR=y resolves CONFIG_DEFAULT_TCP_CONG="bbr" correctly.
      - name: Enable TCP BBR for munch
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          if [ ! -f "$DEFCONFIG" ]; then
            echo "ERROR: $DEFCONFIG not found. Upstream layout changed — update this step."
            exit 1
          fi
          echo "" >> "$DEFCONFIG"
          echo "# TCP BBR - PitchKernel" >> "$DEFCONFIG"
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> "$DEFCONFIG"
          echo "CONFIG_TCP_CONG_BBR=y" >> "$DEFCONFIG"
          echo "CONFIG_DEFAULT_BBR=y" >> "$DEFCONFIG"
          echo "CONFIG_NET_SCH_FQ=y" >> "$DEFCONFIG"

      - name: Build kernel
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      # NEW: fail loud instead of shipping silently broken config. This checks the
      # generated .config (post Kconfig dependency resolution) rather than the
      # defconfig fragment, so it catches the exact failure mode that happened last
      # time — a symbol getting silently dropped during olddefconfig merge.
      - name: Verify BBR actually compiled in
        run: |
          CONFIG_FILE="apasitu/out/.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE=$(find apasitu -maxdepth 3 -name ".config" | head -1)
          fi
          if [ -z "$CONFIG_FILE" ] || [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: could not locate generated .config to verify BBR. Failing build."
            exit 1
          fi
          echo "Checking $CONFIG_FILE for BBR..."
          if ! grep -q '^CONFIG_TCP_CONG_BBR=y' "$CONFIG_FILE"; then
            echo "ERROR: CONFIG_TCP_CONG_BBR did not survive into the final .config."
            echo "This means a dependency (e.g. CONFIG_TCP_CONG_ADVANCED) was not satisfied,"
            echo "or the fragment was overwritten by a later defconfig step."
            exit 1
          fi
          if ! grep -q '^CONFIG_DEFAULT_TCP_CONG="bbr"' "$CONFIG_FILE"; then
            echo "ERROR: BBR compiled in but is not the default congestion control."
            echo "CONFIG_DEFAULT_TCP_CONG resolved to something other than bbr — check"
            echo "that CONFIG_DEFAULT_BBR=y (not a direct string assignment) is set,"
            echo "since this string is derived from a Kconfig choice block."
            grep '^CONFIG_DEFAULT_TCP_CONG=' "$CONFIG_FILE" || true
            exit 1
          fi
          echo "CONFIG_TCP_CONG_BBR=y and CONFIG_DEFAULT_TCP_CONG=\"bbr\" both confirmed."

      - name: Package Stable and Overclock zips
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV

          # IMPORTANT (found via real on-device failure + job log + actual
          # zip inspection, not inference): build.sh ALWAYS builds both
          # AOSP and MIUI sections sequentially in one invocation. The MIUI
          # section runs `rm -rf anykernel/kernels/` (build.sh ~line 347)
          # and repopulates it with ONLY kernels/miui/, deleting
          # kernels/aosp/ entirely. So by the time this step runs (after
          # `bash build.sh` returns), apasitu/anykernel/kernels/ only ever
          # contains MIUI output, never AOSP — confirmed by inspecting a
          # real failed zip that contained kernels/miui/* but no
          # kernels/aosp/* at all, explaining "No kernel found for AOSP
          # ROM!" on a genuine AOSP device.
          #
          # Fix: build.sh produces its OWN self-contained AOSP zip
          # (APTKernel_AOSP_*.zip) immediately after the AOSP section,
          # before the MIUI section ever runs. Extract Image/dtb/dtbo.img
          # from THAT zip instead of trusting post-script anykernel/kernels/.
          AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "APTKernel_AOSP_*.zip" | head -1)
          if [ -z "$AOSP_SRC_ZIP" ] || [ ! -f "$AOSP_SRC_ZIP" ]; then
            echo "ERROR: could not find build.sh's own APTKernel_AOSP_*.zip output."
            find apasitu -maxdepth 1 -name "*.zip"
            exit 1
          fi
          echo "Found AOSP source zip: $AOSP_SRC_ZIP"

          AK3_DIR="apasitu/anykernel"
          if [ ! -d "$AK3_DIR" ]; then
            echo "ERROR: $AK3_DIR not found — build.sh may have changed its output layout."
            exit 1
          fi

          mkdir -p /tmp/aosp_kernel_extract
          unzip -q -j "$AOSP_SRC_ZIP" "kernels/aosp/Image" "kernels/aosp/dtb" "kernels/aosp/dtbo.img" -d /tmp/aosp_kernel_extract
          for f in Image dtb dtbo.img; do
            if [ ! -f "/tmp/aosp_kernel_extract/$f" ]; then
              echo "ERROR: $f not found inside $AOSP_SRC_ZIP either. The AOSP build itself may have failed silently."
              exit 1
            fi
          done
          echo "Confirmed real AOSP Image/dtb/dtbo.img extracted from build.sh's own zip:"
          ls -lh /tmp/aosp_kernel_extract/

          for profile in stable overclock; do
            WORKDIR="/tmp/ak3_${profile}"
            rm -rf "$WORKDIR"
            cp -r "$AK3_DIR" "$WORKDIR"

            # AnyKernel3 tooling/scripts/patch files from anykernel/ are
            # unaffected by the AOSP/MIUI kernels/ wipe (only kernels/
            # itself gets rm -rf'd, not the rest of the directory) — but
            # overwrite kernels/ with the verified-real AOSP files above.
            rm -rf "$WORKDIR/kernels"
            mkdir -p "$WORKDIR/kernels/aosp"
            cp /tmp/aosp_kernel_extract/Image "$WORKDIR/kernels/aosp/"
            cp /tmp/aosp_kernel_extract/dtb "$WORKDIR/kernels/aosp/"
            cp /tmp/aosp_kernel_extract/dtbo.img "$WORKDIR/kernels/aosp/"

            if [ ! -f "$WORKDIR/kernels/aosp/Image" ]; then
              echo "ERROR: Image still missing in $WORKDIR after explicit copy. Aborting."
              exit 1
            fi

            if ! grep -q 'variant="PROFILE_FIXED";' "$WORKDIR/anykernel.sh"; then
              echo "ERROR: expected placeholder variant=\"PROFILE_FIXED\"; not found in anykernel.sh."
              echo "The fork's anykernel.sh may have changed — update this step to match."
              exit 1
            fi
            sed -i "s/variant=\"PROFILE_FIXED\";/variant=\"${profile}\";/" "$WORKDIR/anykernel.sh"
            ACTUAL=$(grep "variant=\"${profile}\";" "$WORKDIR/anykernel.sh")
            echo "[$profile] anykernel.sh -> $ACTUAL"

            if [ "$profile" = "stable" ]; then
              ZIP_NAME="PitchKernel-${TYPE}-munch-Stable-${DATE}.zip"
            else
              ZIP_NAME="PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip"
            fi

            cd "$WORKDIR"
            zip -r9 "$ZIP_NAME" ./* -x .git .gitignore "*.zip" >/dev/null
            # Verify the kernel files actually made it into the final zip,
            # not just into the working directory — this is the exact
            # check that was missing last time and let a broken zip ship.
            if ! unzip -l "$ZIP_NAME" | grep -q "kernels/aosp/Image"; then
              echo "ERROR: kernels/aosp/Image missing from final $ZIP_NAME despite being in $WORKDIR."
              exit 1
            fi
            mv "$ZIP_NAME" "$GITHUB_WORKSPACE/"
            cd "$GITHUB_WORKSPACE"
            echo "Packaged and verified: $ZIP_NAME"
          done

          ls -lh *.zip
          echo "STABLE_ZIP=PitchKernel-${TYPE}-munch-Stable-${DATE}.zip" >> $GITHUB_ENV
          echo "OC_ZIP=PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ./*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Send Stable artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
          ZIP_PATH: ${{ github.workspace }}/${{ env.STABLE_ZIP }}
          ZIP_NAME: ${{ env.STABLE_ZIP }}
          KERNEL_VERSION: "4.19"
          ROOT_SOLUTION: ${{ inputs.ksu && 'RESUKISU' || 'VANILLA' }}
          SUSFS_ENABLED: ${{ inputs.ksu }}
          KERNEL_BRANCH: "android16-aptusitu-new (default)"
          COMPILER_STRING: "ZyCromerZ Clang 16.0.6"
          KERNEL_SRC: "apasitu"
        run: |
          source PitchKernel/release/telegram.sh

      - name: Send Overclock artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
          ZIP_PATH: ${{ github.workspace }}/${{ env.OC_ZIP }}
          ZIP_NAME: ${{ env.OC_ZIP }}
          KERNEL_VERSION: "4.19"
          ROOT_SOLUTION: ${{ inputs.ksu && 'RESUKISU' || 'VANILLA' }}
          SUSFS_ENABLED: ${{ inputs.ksu }}
          KERNEL_BRANCH: "android16-aptusitu-new (default)"
          COMPILER_STRING: "ZyCromerZ Clang 16.0.6"
          KERNEL_SRC: "apasitu"
        run: |
          source PitchKernel/release/telegram.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS (${{ inputs.ksu && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - Auto-detects AOSP / MIUI at flash time
            - CPU Frequency Profile selector (Overclock / Stable / Battery)

            ### Installation
            Flash via TWRP or OrangeFox. Supports Android 11-16.
          files: ./*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

          
