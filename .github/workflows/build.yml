name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Target ROM type'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify build started
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            LABEL="ReSukiSU+SUSFS"
          else
            LABEL="NoKSU"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=🔨 PitchKernel — Build Started%0ADevice: munch (Poco F4)%0AType: ${LABEL} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')" | jq '.ok'

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi \
            device-tree-compiler

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      - name: Set PitchKernel name
        run: |
          echo "-pitchkernel" > apasitu/localversion-st
          echo "" > apasitu/localversion-cip

      - name: Point AnyKernel3 to PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh

      - name: Enable TCP BBR
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          [ -f "$DEFCONFIG" ] || { echo "ERROR: $DEFCONFIG not found"; exit 1; }
          {
            echo ""
            echo "# TCP BBR - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          } >> "$DEFCONFIG"

      - name: Build kernel
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: Package Stable and Overclock zips
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV

          # BUG FIX: target APTKernel_AOSP_*.zip specifically.
          # build.sh always builds BOTH AOSP and MIUI sequentially —
          # the MIUI section wipes anykernel/kernels/aosp/ and repopulates
          # with MIUI files. Using 'find ... | head -1' found whichever
          # zip came first alphabetically, which could be the MIUI zip.
          # Targeting by name ensures we always get the correct AOSP zip.
          AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "APTKernel_AOSP_*.zip" | head -1)
          if [ -z "$AOSP_SRC_ZIP" ] || [ ! -f "$AOSP_SRC_ZIP" ]; then
            echo "ERROR: APTKernel_AOSP_*.zip not found. Available zips:"
            find apasitu -maxdepth 1 -name "*.zip"
            exit 1
          fi
          echo "AOSP source zip: $AOSP_SRC_ZIP ($(du -sh $AOSP_SRC_ZIP | cut -f1))"

          # Extract kernel files from build.sh's own AOSP zip (captured
          # before the MIUI section's rm -rf anykernel/kernels/ runs)
          mkdir -p /tmp/kernel_files
          unzip -q -j "$AOSP_SRC_ZIP" \
            "kernels/aosp/Image" \
            "kernels/aosp/dtb" \
            "kernels/aosp/dtbo.img" \
            -d /tmp/kernel_files/

          for f in Image dtb dtbo.img; do
            if [ ! -f "/tmp/kernel_files/$f" ]; then
              echo "ERROR: $f not found inside $AOSP_SRC_ZIP"
              unzip -l "$AOSP_SRC_ZIP" | grep kernels
              exit 1
            fi
          done
          echo "Extracted kernel files:"
          ls -lh /tmp/kernel_files/

          # AnyKernel3 tooling from the post-MIUI-build anykernel/ directory.
          # The tooling (tools/, META-INF/, anykernel.sh from our fork) is
          # intact — only anykernel/kernels/ got wiped by the MIUI section.
          AK3_DIR="apasitu/anykernel"
          if [ ! -d "$AK3_DIR" ]; then
            echo "ERROR: $AK3_DIR not found"
            ls apasitu/
            exit 1
          fi

          for profile in stable overclock; do
            WORKDIR="/tmp/ak3_${profile}"
            rm -rf "$WORKDIR"
            cp -r "$AK3_DIR" "$WORKDIR"

            # Inject the real AOSP kernel files
            rm -rf "$WORKDIR/kernels"
            mkdir -p "$WORKDIR/kernels/aosp"
            cp /tmp/kernel_files/Image "$WORKDIR/kernels/aosp/"
            cp /tmp/kernel_files/dtb "$WORKDIR/kernels/aosp/"
            cp /tmp/kernel_files/dtbo.img "$WORKDIR/kernels/aosp/"

            # Verify Image actually landed
            if [ ! -f "$WORKDIR/kernels/aosp/Image" ]; then
              echo "ERROR: Image missing after copy for profile=$profile"
              exit 1
            fi

            # Ship dtbo as AOSP only — this dtbo was built for AOSP.
            # anykernel.sh auto-detects ROM from zip filename and renames
            # the correct one; the MIUI dtbo would need a MIUI build.
            # For now both zips are AOSP-targeted.
            cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-aosp-dtbo.img"
            # Provide a MIUI copy too so the volume selector doesn't fail
            # if someone manually selects MIUI on this zip. It's the same
            # dtbo — not ideal but safe (kernel boots, dtbo is less critical)
            cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-miui-dtbo.img"

            # Substitute PROFILE_FIXED in anykernel.sh
            if ! grep -q 'PROFILE_FIXED' "$WORKDIR/anykernel.sh"; then
              echo "ERROR: PROFILE_FIXED placeholder not found in anykernel.sh"
              echo "Fork's anykernel.sh may have changed — update this step"
              head -20 "$WORKDIR/anykernel.sh"
              exit 1
            fi
            sed -i "s/PROFILE_FIXED/${profile}/g" "$WORKDIR/anykernel.sh"
            echo "[$profile] variant substituted: $(grep 'VARIANT=' "$WORKDIR/anykernel.sh" | grep -v '#')"

            # Package
            if [ "$profile" = "stable" ]; then
              ZIP_NAME="PitchKernel-${TYPE}-munch-Stable-${DATE}.zip"
            else
              ZIP_NAME="PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip"
            fi

            cd "$WORKDIR"
            zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . \
              -x ".git/*" -x "*.gitignore" >/dev/null

            # Verify kernel Image is actually inside the final zip
            if ! unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME" | grep -q "kernels/aosp/Image"; then
              echo "ERROR: kernels/aosp/Image missing from $ZIP_NAME"
              exit 1
            fi

            cd "$GITHUB_WORKSPACE"
            echo "Packaged and verified: $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"
          done

          ls -lh *.zip
          echo "STABLE_ZIP=PitchKernel-${TYPE}-munch-Stable-${DATE}.zip" >> $GITHUB_ENV
          echo "OC_ZIP=PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: |
            ${{ env.STABLE_ZIP }}
            ${{ env.OC_ZIP }}
          if-no-files-found: error
          retention-days: 7

      - name: Send artifacts to Telegram
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            export ROOT_SOLUTION="RESUKISU"
            export SUSFS_ENABLED="true"
          else
            export ROOT_SOLUTION="VANILLA"
            export SUSFS_ENABLED="false"
          fi
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export TELEGRAM_THREAD_ID_ARTIFACT="${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}"
          export KERNEL_VERSION="4.19"
          export KERNEL_BRANCH="default (apasitu)"
          export COMPILER_STRING="ZyCromerZ Clang 16.0.6"
          export KERNEL_SRC="$GITHUB_WORKSPACE/apasitu"
          for ZIP in "${{ env.STABLE_ZIP }}" "${{ env.OC_ZIP }}"; do
            export ZIP_PATH="$GITHUB_WORKSPACE/$ZIP"
            export ZIP_NAME="$ZIP"
            source PitchKernel/release/telegram.sh
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS v2.1.0 (${{ inputs.ksu && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - ROM auto-detection: MIUI/HyperOS or AOSP (from zip filename, falls back to volume-key)

            ### CPU Frequency Profiles
            | Zip | Prime core (cpu7) |
            |---|---|
            | Stable | 2841600 kHz |
            | Overclock | 3187200 kHz |

            Profile applied via `/data/.pitchkernel_profile` written at flash time.
            Requires the PitchKernel cpufreq module installed via KernelSU/Magisk to enforce on boot.

            ### Installation
            Flash via OrangeFox or TWRP. Supports Android 11-16 AOSP ROMs.
          files: |
            ${{ env.STABLE_ZIP }}
            ${{ env.OC_ZIP }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
