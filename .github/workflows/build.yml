name: 🔨 Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Build script (build.sh = AOSP ROMs, build-miui.sh = MIUI/HyperOS)'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: PitchKernel — munch (${{ inputs.script }}) (${{ inputs.ksu && 'ReSukiSU+SUSFS' || 'NoKSU' }})
    runs-on: ubuntu-latest

    steps:
      - name: 🧹 Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache python-is-python3

      - name: 🔧 Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ inputs.script }}-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-${{ inputs.script }}-
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: 🛠️ Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          cd $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz
          tar -zxf Clang-16.0.6-20260510.tar.gz
          rm Clang-16.0.6-20260510.tar.gz

      - name: 🧬 Clone apasitu kernel source
        run: |
          git clone --depth=1 \
            -b android16-aptusitu-new \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            kernel_source

      - name: ⚡ Enable TCP BBR
        run: |
          MUNCH_CONF="kernel_source/arch/arm64/configs/vendor/xiaomi/munch.config"
          {
            echo ""
            echo "# TCP BBR — PitchKernel"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\""
          } >> "$MUNCH_CONF"
          echo "✅ BBR appended to munch.config"
          grep -i "bbr\|fq" "$MUNCH_CONF"

      - name: 🔨 Build kernel
        run: |
          cd kernel_source
          chmod +x ${{ inputs.script }}

          if [ "${{ inputs.ksu }}" == "true" ]; then
            echo "🔑 Building with ReSukiSU + SUSFS..."
            bash ${{ inputs.script }} munch ksu
          else
            echo "🚫 Building without KSU..."
            bash ${{ inputs.script }} munch
          fi

      - name: 📦 Rename zip to PitchKernel
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          TYPE="${{ inputs.ksu == 'true' && 'sukisu' || 'noksu' }}"
          for f in kernel_source/*.zip; do
            [ -f "$f" ] && mv "$f" "PitchKernel-${TYPE}-munch-${DATE}.zip"
          done
          ls *.zip || { echo "❌ No zip found"; exit 1; }

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: ./*.zip
          if-no-files-found: error
          retention-days: 7
          
