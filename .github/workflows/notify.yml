name: Notify

on:
  push:
  workflow_run:
    workflows: ["Build PitchKernel"]
    types: [completed]

jobs:
  on-push:
    name: Push Notify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Notify Push
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          TITLE=$(echo "${{ github.event.head_commit.message }}" | head -1)
          BODY=$(echo "${{ github.event.head_commit.message }}" | tail -n +3)

          # Bug fix: HTML-entity-encode user-controlled strings before embedding in
          # HTML parse_mode. Raw & < > in commit messages silently break Telegram's
          # HTML parser (message not sent, no error shown).
          html_encode() {
            local s="$1"
            s="${s//&/&amp;}"
            s="${s//</&lt;}"
            s="${s//>/&gt;}"
            printf '%s' "$s"
          }

          TITLE_SAFE=$(html_encode "$TITLE")
          AUTHOR_SAFE=$(html_encode "$AUTHOR")

          # Bug fix (original): literal newlines inside a quoted bash string inside
          # a YAML block scalar break YAML parsing (GitHub reports "yaml syntax error
          # on line N"). Use printf with \n escape sequences instead.
          TEXT=$(printf '📌 <b>PitchKernel</b> — New Commit\n<code>%s</code>\nBy: %s\n\n<i>%s</i>' \
            "$SHORT" "$AUTHOR_SAFE" "$TITLE_SAFE")

          if [ -n "$BODY" ]; then
            BODY_SAFE=$(html_encode "$BODY")
            TEXT=$(printf '%s\n\n<pre>%s</pre>' "$TEXT" "$BODY_SAFE")
          fi

          # Bug fix: use --data-urlencode for the text field so that special chars
          # (&, =, +, newlines) in commit messages don't corrupt the curl form body.
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" | jq '.ok'

  on-build:
    name: Build Notify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Notify Build Result
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          # Bug fix: original used %0A (URL encoding) inside a string passed to
          # --data-urlencode, which double-encodes it. Use printf with \n instead.
          # Also: parse_mode=HTML requires HTML-safe content; date output is safe here.
          if [ "$CONCLUSION" = "success" ]; then
            TEXT=$(printf '✅ <b>PitchKernel</b> — Build Succeeded\nDevice: munch (Poco F4)\nDate: %s' \
              "$(date +'%Y-%m-%d %H:%M UTC')")
          else
            TEXT=$(printf '❌ <b>PitchKernel</b> — Build Failed\nDevice: munch (Poco F4)\nDate: %s' \
              "$(date +'%Y-%m-%d %H:%M UTC')")
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" | jq '.ok'
            
