name: Build Munch Kernel

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel source (user/repo)'
        required: true
        default: 'crdroidandroid/android_kernel_xiaomi_sm8250-munch'
      KERNEL_BRANCH:
        description: 'Kernel source branch'
        required: true
        default: '14.0'
      ENABLE_SUSFS:
        description: 'Enable SUSFS'
        type: boolean
        default: true
      ENABLE_BBR:
        description: 'Enable BBR TCP congestion'
        type: boolean
        default: true
      KERNEL_NAME:
        description: 'Kernel name string (shown in uname -r)'
        required: true
        default: 'VeilKernel-munch'

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
      TZ: Asia/Kuala_Lumpur
      # ZyC Clang 14 — confirmed active link file, good for 4.19 kernels
      CLANG_LINK_URL: "https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-14-link.txt"

    steps:

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex git \
            libelf-dev libssl-dev lz4 python3 zip zstd cpio \
            ccache libncurses-dev binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi

      - name: Resolve Clang download URL
        run: |
          CLANG_URL=$(curl -s "$CLANG_LINK_URL" | tr -d '[:space:]')
          if [ -z "$CLANG_URL" ]; then
            echo "::error::Failed to resolve Clang URL from link file"
            exit 1
          fi
          echo "Resolved Clang URL: $CLANG_URL"
          echo "CLANG_URL=$CLANG_URL" >> $GITHUB_ENV
          # Extract a stable cache key from the filename in the URL
          CLANG_FILENAME=$(basename "$CLANG_URL" .tar.gz)
          echo "CLANG_CACHE_KEY=$CLANG_FILENAME" >> $GITHUB_ENV

      - name: Cache ZyC Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: /opt/clang
          key: ${{ env.CLANG_CACHE_KEY }}

      - name: Download ZyC Clang (if not cached)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/clang
          echo "Downloading: $CLANG_URL"
          curl -L --retry 5 --retry-delay 5 --fail -o /tmp/clang.tar.gz "$CLANG_URL"
          echo "Extracting..."
          tar -xf /tmp/clang.tar.gz -C /opt/clang
          rm /tmp/clang.tar.gz
          echo "Clang ready:"
          /opt/clang/bin/clang --version

      - name: Add Clang to PATH
        run: echo "/opt/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b "${{ github.event.inputs.KERNEL_BRANCH }}" \
            "https://github.com/${{ github.event.inputs.KERNEL_SOURCE }}" \
            kernel
          echo "=== Kernel version ==="
          head -5 kernel/Makefile
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      - name: Merge latest AOSP 4.19-stable
        working-directory: kernel
        run: |
          git config user.email "ci@build.local"
          git config user.name "CI Build"
          git remote add aosp https://android.googlesource.com/kernel/common
          git fetch aosp android-4.19-stable --depth=1
          git merge aosp/android-4.19-stable \
            --allow-unrelated-histories \
            --no-edit \
            -m "Merge android-4.19-stable" || {
              echo "::warning::Merge conflict — auto-resolving Makefile"
              git checkout --ours Makefile 2>/dev/null && git add Makefile || true
              git merge --continue --no-edit || {
                echo "::error::Merge failed"
                git diff --name-only --diff-filter=U
                exit 1
              }
            }
          head -5 Makefile

      - name: Integrate KernelSU-Next
        working-directory: kernel
        run: |
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s legacy
          if [ ! -d "drivers/kernelsu" ]; then
            echo "::error::KernelSU-Next setup failed"
            exit 1
          fi
          echo "KSU version: $(grep KSU_VERSION drivers/kernelsu/Makefile | head -1)"
          DEFCONFIG_PATH="arch/arm64/configs/$(basename $KERNEL_DEFCONFIG)"
          printf '\n# KernelSU-Next\nCONFIG_KSU=y\nCONFIG_KSU_DEBUG=n\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y\n' >> "$DEFCONFIG_PATH"

      - name: Integrate SUSFS
        if: ${{ github.event.inputs.ENABLE_SUSFS == 'true' }}
        working-directory: kernel
        run: |
          SUSFS_TAG=$(curl -s \
            https://api.github.com/repos/sidex15/susfs4ksu/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "SUSFS tag: $SUSFS_TAG"
          git clone --depth=1 -b "$SUSFS_TAG" \
            https://github.com/sidex15/susfs4ksu /tmp/susfs
          PATCH_FILE="/tmp/susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::4.19 patch not found. Available:"
            ls /tmp/susfs/kernel_patches/
            exit 1
          fi
          patch -p1 --forward < "$PATCH_FILE" \
            && echo "SUSFS patch applied" \
            || echo "::warning::SUSFS patch had rejects"
          KSU_PATCH="/tmp/susfs/kernel_patches/next/scope_minimize_patches_for_ksu_next.patch"
          if [ -f "$KSU_PATCH" ]; then
            patch -p1 --forward < "$KSU_PATCH" \
              || echo "::warning::KSU companion patch had rejects"
          fi
          find . -name "*.rej" -exec echo "REJECT: {}" \; -exec cat {} \;
          DEFCONFIG_PATH="arch/arm64/configs/$(basename $KERNEL_DEFCONFIG)"
          printf '\n# SUSFS\nCONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\nCONFIG_KSU_SUSFS_SUS_KSTAT=y\nCONFIG_KSU_SUSFS_SUS_OVERLAYFS=n\nCONFIG_KSU_SUSFS_TRY_UMOUNT=y\nCONFIG_KSU_SUSFS_SPOOF_UNAME=y\nCONFIG_KSU_SUSFS_ENABLE_LOG=y\nCONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y\nCONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y\n' >> "$DEFCONFIG_PATH"

      - name: Enable BBR TCP
        if: ${{ github.event.inputs.ENABLE_BBR == 'true' }}
        working-directory: kernel
        run: |
          DEFCONFIG_PATH="arch/arm64/configs/$(basename $KERNEL_DEFCONFIG)"
          printf '\n# BBR TCP\nCONFIG_TCP_CONG_BBR=y\nCONFIG_NET_SCH_FQ=y\nCONFIG_DEFAULT_TCP_CONG="bbr"\n' >> "$DEFCONFIG_PATH"
          echo "BBR config appended"

      - name: Build kernel
        working-directory: kernel
        run: |
          mkdir -p out
          BUILD_FLAGS=(
            ARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
            LOCALVERSION="-${{ github.event.inputs.KERNEL_NAME }}"
          )
          make O=out "${BUILD_FLAGS[@]}" $KERNEL_DEFCONFIG
          if [ -f arch/arm64/configs/munch.config ]; then
            KCONFIG_ALLCONFIG=arch/arm64/configs/munch.config \
              make O=out "${BUILD_FLAGS[@]}" olddefconfig
          else
            make O=out "${BUILD_FLAGS[@]}" olddefconfig
          fi
          echo "=== Config check ==="
          for cfg in CONFIG_KSU CONFIG_KPROBES CONFIG_TCP_CONG_BBR CONFIG_KSU_SUSFS; do
            grep "^${cfg}" out/.config && true || echo "${cfg} = NOT SET"
          done
          time make O=out "${BUILD_FLAGS[@]}" \
            -j$(nproc --all) \
            Image.gz-dtb dtbo.img \
            2>&1 | tee build.log
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::error::Build failed — Image.gz-dtb not found"
            tail -80 build.log
            exit 1
          fi
          ls -lh out/arch/arm64/boot/Image.gz-dtb
          [ -f out/arch/arm64/boot/dtbo.img ] && ls -lh out/arch/arm64/boot/dtbo.img || true

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && \
            cp kernel/out/arch/arm64/boot/dtbo.img anykernel/ || true
          KNAME="${{ github.event.inputs.KERNEL_NAME }}"
          {
            echo "# AnyKernel3 config - munch (POCO F4)"
            echo "properties() { '"
            echo "kernel.string=${KNAME} by CI"
            echo "do.devicecheck=1"
            echo "do.modules=0"
            echo "do.systemless=1"
            echo "do.cleanup=1"
            echo "do.cleanuponabort=0"
            echo "device.name1=munch"
            echo "device.name2=munch"
            echo "supported.versions=12-15"
            echo "supported.patchlevels="
            echo "'; }"
            echo ""
            echo "block=/dev/block/bootdevice/by-name/boot;"
            echo "is_slot_device=1;"
            echo "ramdisk_compression=auto;"
            echo "patch_vbmeta_flag=auto;"
            echo ""
            echo ". tools/ak3-core.sh;"
            echo '. split_img "$block";'
            echo ". flash_boot;"
          } > anykernel/anykernel.sh
          ZIPNAME="${KNAME}-$(date +%Y%m%d-%H%M)"
          [ "${{ github.event.inputs.ENABLE_SUSFS }}" = "true" ] && ZIPNAME="${ZIPNAME}-SUSFS"
          [ "${{ github.event.inputs.ENABLE_BBR }}" = "true" ] && ZIPNAME="${ZIPNAME}-BBR"
          ZIPNAME="${ZIPNAME}-KSUN.zip"
          cd anykernel
          zip -r9 "../${ZIPNAME}" . -x '.git*' -x 'README.md'
          cd ..
          echo "OUTPUT_ZIP=${ZIPNAME}" >> $GITHUB_ENV
          ls -lh "${ZIPNAME}"

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.KERNEL_NAME }}
          path: "*.zip"
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Print final summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | ${{ github.event.inputs.KERNEL_SOURCE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.KERNEL_BRANCH }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | ${{ github.event.inputs.ENABLE_SUSFS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BBR | ${{ github.event.inputs.ENABLE_BBR }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | ${OUTPUT_ZIP:-FAILED} |" >> $GITHUB_STEP_SUMMARY
          
