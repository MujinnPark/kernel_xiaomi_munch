name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Build script — only build.sh (AOSP+MIUI dual zip) is currently supported. build-miui.sh (MIUI-only) is not wired into the packaging step yet.'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
      ksu:
        # NOTE: this description is a static string — GitHub Actions evaluates
        # workflow_dispatch.inputs at trigger-definition time, before any job
        # env exists, so it CANNOT reference env.ROOT_PROVIDER below. If the
        # root provider changes again, this line must be edited by hand.
        # That is exactly the kind of manual, easy-to-forget step that caused
        # this repo to say "KernelSU Next" in five places after switching
        # back to ReSukiSU. Don't forget this one too.
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-24.04
    env:
      # SINGLE SOURCE OF TRUTH for which root provider this pipeline builds.
      # Every label below (Telegram start message, artifact/zip name, telegram.sh
      # caption, GitHub release body) reads from these two variables instead of
      # hardcoding the provider name separately in each spot. This exists because
      # a prior revert (KernelSU-Next -> ReSukiSU) fixed apasitu/build.sh but left
      # five independent hardcoded "KernelSU Next" strings scattered across this
      # file, and every one of them silently kept lying after the code was fixed.
      # If the root provider ever changes again: change these two lines, nothing
      # else in this file should need to be touched.
      ROOT_PROVIDER: ReSukiSU        # human-readable, used in messages/labels
      ROOT_SOLUTION_KEY: RESUKISU    # machine key, must match a case in telegram.sh

    steps:
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify build started
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            LABEL="${{ env.ROOT_PROVIDER }} + SUSFS"
          else
            LABEL="NoKSU"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=🔨 PitchKernel — Build Started%0ADevice: munch (Poco F4)%0AType: ${LABEL} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')" | jq '.ok'

      - name: Guard unsupported build script selection
        run: |
          if [ "${{ inputs.script }}" != "build.sh" ]; then
            echo "FATAL: ${{ inputs.script }} is not wired into the packaging step."
            echo "The Package zip step requires both PitchKernel_AOSP_*.zip and PitchKernel_MIUI_*.zip."
            echo "build-miui.sh only produces the MIUI zip. Wire up packaging before enabling."
            exit 1
          fi
          echo "Build script: ${{ inputs.script }} — OK"

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev \
            python-is-python3 gcc-arm-linux-gnueabi \
            device-tree-compiler

      - name: Clone apasitu kernel source
        env:
          # PINNED ON PURPOSE. Do not remove -b / add --no-single-branch back.
          #
          # Real incident (found by log/repo audit, 2026-07-03): this step used to
          # clone with --no-single-branch and no -b flag, which pulls whatever
          # AstideLabs' default HEAD branch happens to be. At the time of the audit
          # that was `android16-aptusitu` — NOT `android16-aptusitu-new`, which is
          # the branch this project's docs/CI have always assumed. Diffed the two:
          # 6,597 files / ~1.39M lines different. They are not close variants.
          # Every build run before this fix may have silently built the wrong tree
          # with no error, because both branches have a valid build.sh/build-miui.sh
          # and both build successfully — there's no structural signal that you got
          # the wrong one. If AstideLabs' default branch changes again, or if you
          # deliberately mean to track a different branch, that's fine — just make
          # the change here, explicitly, and update KERNEL_SOURCE_BRANCH below to
          # match. Do not go back to letting `git clone` pick for you.
          KERNEL_SOURCE_BRANCH: android16-aptusitu
        run: |
          echo "Cloning branch: ${KERNEL_SOURCE_BRANCH} (pinned explicitly — see step comment)"
          git clone --depth=1 --single-branch -b "${KERNEL_SOURCE_BRANCH}" \
            https://github.com/MujinnPark/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh
          RESOLVED_SHA=$(git -C apasitu rev-parse --short HEAD)
          echo "KERNEL_SOURCE_BRANCH=${KERNEL_SOURCE_BRANCH}" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_SHA=${RESOLVED_SHA}" >> $GITHUB_ENV
          echo "Resolved to commit: ${RESOLVED_SHA}"

      - name: CPU baseline benchmark
        run: |
          echo "nproc: $(nproc)"
          cat /proc/cpuinfo | grep "model name" | head -1
          echo "BUILD_START_EPOCH=$(date +%s)" >> $GITHUB_ENV
          openssl speed -seconds 2 aes-256-cbc 2>&1 | tail -3

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/neutron-clang"
          cd "$HOME/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S=30062026

      - name: Verify ATFWD-daemon not excluded from sucompat
        run: |
          if grep -rq "ATFWD-daemon" apasitu/kernel/ksu/ 2>/dev/null; then
            echo "FATAL: ATFWD-daemon still present in KernelSU source after patch step."
            grep -rn "ATFWD-daemon" apasitu/kernel/ksu/
            exit 1
          fi
          echo "OK: ATFWD-daemon not found in KernelSU exclusion source."

      - name: Set PitchKernel name
        run: |
          echo "-pitchkernel" > apasitu/localversion-st
          echo "" > apasitu/localversion-cip

      - name: Point AnyKernel3 to PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh

      - name: Patch defconfig
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          [ -f "$DEFCONFIG" ] || { echo "ERROR: $DEFCONFIG not found"; exit 1; }

          sed -i 's/CONFIG_LOCALVERSION="-aptusitu-perf"/CONFIG_LOCALVERSION=""/' "$DEFCONFIG"

          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --disable LOCALVERSION_AUTO
          cd ..

          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --disable UCLAMP_TASK \
            --disable UCLAMP_TASK_GROUP
          cd ..

          {
            echo ""
            echo "# TCP congestion control - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_TCP_CONG_WESTWOOD=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo "CONFIG_DEFAULT_BBR=y"
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr"'
            echo ""
            echo "# I/O scheduler — PitchKernel"
            echo "# CONFIG_IOSCHED_CFQ is not set"
            echo "CONFIG_MQ_IOSCHED_DEADLINE=y"
            echo 'CONFIG_DEFAULT_IOSCHED="mq-deadline"'
          } >> "$DEFCONFIG"

          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --enable MQ_IOSCHED_DEADLINE \
            --disable IOSCHED_CFQ \
            --disable MQ_IOSCHED_KYBER \
            --set-str DEFAULT_IOSCHED "mq-deadline" \
            --enable SCSI_MQ_DEFAULT \
            --enable BLK_WBT_MQ
          cd ..


          # Thermal subsystem — fix for ThermalHalWrapper HAL read failures
          # (36 "Sensor Temperature read failure" errors per 8 minutes in logcat)
          cd apasitu
          ./scripts/config --file arch/arm64/configs/munch_defconfig \
            --enable THERMAL \
            --enable THERMAL_OF \
            --enable THERMAL_GOV_STEP_WISE \
            --enable QCOM_TSENS \
            --enable QCOM_SPMI_TEMP_ALARM
          cd ..

          echo "Patched defconfig (tail -20):"
          tail -20 "$DEFCONFIG"
          echo ""
          echo "Verifying uclamp directives:"
          grep -E "UCLAMP_TASK|LOCALVERSION_AUTO" "$DEFCONFIG" || echo "WARNING: grep found nothing"

      - name: Setup ccache
        run: |
          # Pinned version, installed directly -- do NOT apt-get install ccache.
          # apt's ccache drops compiler-name symlinks under /usr/lib/ccache/
          # that silently shadow this binary if both land on PATH. Confirmed
          # incident: two ccache installs racing on PATH caused `ccache -s` to
          # report 0.0/5.0 GiB used against a real ~1.4G on-disk cache dir.
          # Only this one binary may be on PATH for the build.
          CCACHE_VERSION="4.10.2"
          wget -q "https://github.com/ccache/ccache/releases/download/v${CCACHE_VERSION}/ccache-${CCACHE_VERSION}-linux-x86_64.tar.xz" -O ccache.tar.xz
          tar -xf ccache.tar.xz
          sudo install -m 755 "ccache-${CCACHE_VERSION}-linux-x86_64/ccache" /usr/local/bin/ccache
          rm -rf ccache.tar.xz "ccache-${CCACHE_VERSION}-linux-x86_64"
          ccache --version | head -1
          echo "All ccache binaries visible on PATH (should be exactly one):"
          which -a ccache || type -a ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          # Key includes OS, pinned clang release, defconfig content hash, and
          # ksu on/off (the ksu-enabled pass compiles a materially different
          # set of translation units than the vanilla pass). restore-keys
          # fall back progressively so a partial match beats a cold cache.
          key: ccache-munch-${{ runner.os }}-neutronclang23-30062026-ksu${{ inputs.ksu }}-${{ hashFiles('apasitu/arch/arm64/configs/munch_defconfig') }}
          restore-keys: |
            ccache-munch-${{ runner.os }}-neutronclang23-30062026-ksu${{ inputs.ksu }}-
            ccache-munch-${{ runner.os }}-neutronclang23-30062026-

      - name: Build kernel
        # TEMPORARY TEST (see PitchKernel note below) - tee/process-substitution
        # and explicit pipefail shell removed to isolate a confirmed 3x
        # per-compile-call slowdown (105ms/call -> 325-355ms/call, same 8014
        # call count, 3 consecutive identical-SHA builds) that started exactly
        # when tee was added for the noise-annotation feature. Hypothesis:
        # piping every one of 8000+ build output lines through a process-
        # substitution grep filter AND tee (disk write) adds real per-line
        # overhead during compilation itself, not just after. If this build
        # returns to ~13-17min / ~105ms per call, the hypothesis is confirmed
        # and tee needs to be redesigned (e.g. redirect to file only, without
        # also duplicating to the live log stream) rather than reverted outright,
        # since the pipefail fix (actions/runner#1955) is still needed for
        # correctness once tee comes back.
        env:
          KBUILD_BUILD_TIMESTAMP: ''
          KBUILD_BUILD_USER: pitchkernel
          KBUILD_BUILD_HOST: github-actions
          CCACHE_DIR: /home/runner/.cache/ccache_mikernel
          CCACHE_MAXSIZE: 5G
          CCACHE_COMPILERCHECK: content
          CCACHE_COMPRESS: 'true'
          CCACHE_COMPRESSLEVEL: '6'
          CCACHE_SLOPPINESS: include_file_mtime,include_file_ctime,time_macros
          CCACHE_BASEDIR: ${{ github.workspace }}
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          # PitchKernel: ReSukiSU's setup.sh (pulled fresh from upstream inside
          # build.sh) runs a GKI-oriented compat probe that greps for
          # include/linux/seccomp_types.h. That header was introduced upstream
          # in Linux 5.x+ (split out of seccomp.h) and does not exist on this
          # 4.19.325 non-GKI tree, so the grep fails harmlessly and ReSukiSU
          # just skips that compat shim. The grep runs from a process nested
          # inside setup.sh's own build/config step, so filtering stderr
          # inside build.sh via `2> >(...)` does not reliably catch it -
          # nested subprocesses can reopen fd 2 in ways that bypass the
          # parent's process substitution. Filtering the whole step's output
          # here is reliable regardless of nesting depth. Only this exact
          # known-benign line is stripped; any other ReSukiSU/setup output,
          # including real new failures, still passes through untouched.
          #
          # TEMPORARILY REMOVED FOR THIS TEST: the `2> >(grep -v ...)` filter
          # and `| tee /tmp/pitchkernel-build-step.log`. This means the
          # seccomp_types.h noise and the noise-annotation step's input file
          # will not be present in THIS build's log -- expected and fine for
          # a one-off timing test. Do not leave the pipeline in this state;
          # both need to come back once the slowdown mechanism is confirmed.
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: DEBUG - snapshot ReSukiSU/SUSFS generated source layout
        # PitchKernel: temporary, one-off diagnostic step. ReSukiSU's setup.sh
        # (fetched fresh from upstream in the "Build kernel" step above) writes
        # its KSU driver source and SUSFS integration directly into the kernel
        # source tree at build time -- none of it is vendored in this repo, so
        # there is no static way to inspect its actual file layout. This is
        # needed to evaluate whether/how a SUSFS 2.2.0 backport patch (written
        # against a different KSU fork's static layout: kernel/feature/,
        # kernel/hook/, kernel/supercall/) could apply here, since those paths
        # do not exist anywhere in this repo's static source.
        #
        # Safe to run after "Build kernel": build.sh's own rm -rf calls only
        # target build output (out/, anykernel/, dts staging), never the
        # checked-out kernel source tree itself, so whatever setup.sh wrote
        # should still be present in apasitu/ at this point in the job.
        #
        # Remove this step once the SUSFS 2.2.0 investigation is resolved --
        # it exists to answer a specific open question, not as permanent CI.
        if: always()
        run: |
          cd apasitu
          echo "### Searching for KSU/SUSFS driver source actually written by setup.sh ###"
          echo ""
          echo "--- directories matching feature/hook/supercall/kernelsu/susfs (case-insensitive) ---"
          find . -type d \( -iname "*kernelsu*" -o -iname "*resukisu*" -o -iname "*susfs*" \
            -o -iname "feature" -o -iname "hook" -o -iname "supercall" \) 2>/dev/null | grep -v "^\./\.git"
          echo ""
          echo "--- files matching known SUSFS/KSU source filenames ---"
          find . -iname "susfs*.c" -o -iname "susfs*.h" -o -iname "ksu.c" -o -iname "kernel_umount.c" \
            -o -iname "setuid_hook.c" 2>/dev/null | grep -v "^\./\.git"
          echo ""
          echo "--- any KSU_SUSFS-related Kconfig entries actually present after setup.sh ran ---"
          grep -rn "KSU_SUSFS" --include="Kconfig*" . 2>/dev/null | head -30
          echo ""
          echo "--- top-level dirs in kernel source root, for orientation ---"
          ls -la .
          echo ""
          echo "--- if a KernelSU-style top-level driver dir exists, show its structure ---"
          for d in KernelSU kernelsu drivers/kernelsu; do
            if [ -d "$d" ]; then
              echo "found: $d"
              find "$d" -maxdepth 3 -type f | head -50
            fi
          done

      - name: Report ccache stats
        if: always()
        env:
          # Without this, ccache -s falls back to its default ~/.cache/ccache
          # (empty) instead of the real cache dir the build wrote to, which is
          # env-scoped to the Build kernel step only. This is why the previous
          # run reported "0.0 / 5.0 GiB" while `du` found a real 828M on disk
          # at the same path -- two different directories, not a broken cache.
          CCACHE_DIR: /home/runner/.cache/ccache_mikernel
        run: |
          ccache -s || true
          du -sh ~/.cache/ccache_mikernel 2>/dev/null || echo "cache dir not found"

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache_mikernel
          # actions/cache keys are immutable once written -- a save on the same
          # restore key would silently no-op on every run after the first.
          # run_id makes each save unique; restore-keys prefix-matching on the
          # next run picks up the most recent save automatically.
          key: ccache-munch-${{ runner.os }}-neutronclang23-30062026-ksu${{ inputs.ksu }}-${{ hashFiles('apasitu/arch/arm64/configs/munch_defconfig') }}-${{ github.run_id }}

      - name: Annotate known-benign build noise
        run: |
          # PitchKernel: several third-party tools invoked during the build
          # (ReSukiSU's setup.sh, ak3/symbol-scan utilities, wget) print raw,
          # unlabeled diagnostic lines that read like failures out of context --
          # this has already cost two full debugging round-trips (the
          # seccomp_types.h grep noise, the report_cfi_failure symbol-scan
          # miss). Nothing upstream tags these as benign, so anyone reading the
          # log has to re-derive the classification from scratch every time.
          # This step is a running registry: known-benign patterns, confirmed
          # against source, get flagged here so future log reviews (human or
          # AI) start from a known baseline instead of re-investigating noise
          # that's already been traced and closed out.
          #
          # Adding a new entry: only add a pattern here after tracing it to a
          # real, harmless, upstream/third-party root cause -- the same bar
          # used for the entries below. This file is not a place to silence
          # things that are merely inconvenient or unexplained.
          LOG="/tmp/pitchkernel-build-step.log"
          [ -f "$LOG" ] || { echo "No build-step log captured -- skipping annotation."; exit 0; }

          echo "### Known-benign noise check ###"
          echo ""

          check_pattern() {
            local pattern="$1"
            local label="$2"
            local count
            count=$(grep -c "$pattern" "$LOG" || true)
            if [ "$count" -gt 0 ]; then
              echo "[benign] x$count -- $label"
              echo "         pattern: $pattern"
            fi
          }

          check_pattern "seccomp_types.h: No such file or directory" \
            "ReSukiSU compat probe checks a GKI-era (5.x+) header that does not exist on this 4.19.325 non-GKI tree; grep fails harmlessly and ReSukiSU skips that compat shim. See build.yml 'Build kernel' step for the stderr filter and full explanation."

          check_pattern "no symbol: report_cfi_failure" \
            "Symbol-scan tool checks for a name that has never existed in this kernel or ReSukiSU's shipped code under any config; the real exported symbol is cfi_failure_handler (kernel/cfi.c). CONFIG_CFI_CLANG=y with CONFIG_CFI_PERMISSIVE unset (enforcing mode) is correct and consistent with this miss. No fix needed."

          check_pattern "Error in reading or end of file." \
            "wget's own benign notice when opening a fresh connection with no prior resume state; the download it precedes (patch_linux from SukiSU-Ultra releases) completes normally in the following lines."

          echo ""
          echo "Any other ERROR/FATAL/WARNING text in the log that is NOT listed above"
          echo "has not been traced and classified yet -- treat it as a real signal,"
          echo "not noise, until it has been."

      - name: Verify SUSFS actually compiled in
        run: |
          # This step exists because of a real incident: a prior CI change swapped
          # the root provider in apasitu/build.sh (ReSukiSU -> KernelSU-Next) without
          # touching the `scripts/config -e KSU_SUSFS ...` block that follows it.
          # KSU_SUSFS is not a real Kconfig symbol unless the root provider's tree
          # actually contains susfs source. scripts/config does not validate against
          # Kconfig — it blindly writes the .config line — and kbuild silently drops
          # unrecognized symbols during syncconfig. Result: the build succeeds, the
          # Image is produced, every structural check passes, and the kernel ships
          # with zero SUSFS code compiled in while everything *labels* it as enabled.
          # That shipped silently for an unknown number of releases. This step is the
          # gate that should have existed from the start: check the real .config,
          # not a label, not a filename, not a comment.
          if [ "${{ inputs.ksu }}" != "true" ]; then
            echo "ksu=false — SUSFS not expected, skipping verification."
            exit 0
          fi

          CONFIG_FILE="apasitu/out/.config"
          [ -f "$CONFIG_FILE" ] || { echo "FATAL: $CONFIG_FILE not found — build may not have produced a config"; exit 1; }

          echo "Checking $CONFIG_FILE for KSU and SUSFS symbols..."
          MISSING=0
          for SYM in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SUS_MOUNT CONFIG_KSU_SUSFS_SUS_KSTAT CONFIG_KSU_SUSFS_SPOOF_UNAME; do
            if grep -q "^${SYM}=y" "$CONFIG_FILE"; then
              echo "  OK: ${SYM}=y"
            else
              echo "  MISSING: ${SYM} is not set to y in the generated .config"
              MISSING=1
            fi
          done

          SUSFS_HEADER="apasitu/include/linux/susfs.h"
          if [ -f "$SUSFS_HEADER" ]; then
            echo "  OK: $SUSFS_HEADER exists"
          else
            echo "  MISSING: $SUSFS_HEADER does not exist — susfs source was never added to the tree"
            MISSING=1
          fi

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "FATAL: ksu=true was requested but SUSFS is not actually compiled in."
            echo "Do not let this build ship as a 'SUSFS' release. Check apasitu/build.sh:"
            echo "  - does the ksu-enabled branch clone a root provider whose tree includes susfs source?"
            echo "  - if you changed the root provider (ReSukiSU/SukiSU/KernelSU/KernelSU-Next), the"
            echo "    'scripts/config -e KSU_SUSFS ...' block only works if that provider bundles susfs"
            echo "    OR you added an explicit susfs4ksu patch step before this build ran."
            exit 1
          fi

          echo "SUSFS verification passed — real, not just labeled."

      - name: Verify pitchkernel scripts are in the AK3 overlay
        run: |
          for f in pitchkernel_cpufreq.sh pitchkernel_banking_prep.sh pitchkernel_sepolicy.sh; do
            TARGET="PitchKernel/anykernel/patch/$f"
            if [ ! -f "$TARGET" ]; then
              echo "FATAL: $TARGET missing from repo — will not be installed to post-fs-data.d"
              exit 1
            fi
            if [ ! -x "$TARGET" ]; then
              echo "WARNING: $TARGET is not executable — fixing"
              chmod 755 "$TARGET"
            fi
            # Verify the script has a PitchKernel log line (so logcat tag will appear on device)
            if ! grep -q "log -p.*PitchKernel" "$TARGET"; then
              echo "WARNING: $TARGET has no 'log -p.*PitchKernel' line — boot execution will be silent"
            fi
            echo "OK: $TARGET"
          done

      - name: Verify ak3-core.sh is complete
        run: |
          TARGET="apasitu/anykernel/tools/ak3-core.sh"
          [ -f "$TARGET" ] || { echo "ERROR: $TARGET not found — build may have failed"; exit 1; }
          LINES=$(wc -l < "$TARGET")
          echo "ak3-core.sh: $LINES lines"
          if [ "$LINES" -lt 900 ]; then
            echo "FATAL: ak3-core.sh is truncated at $LINES lines."
            echo "The MujinnPark/AnyKernel3 fork has a broken tools/ak3-core.sh."
            echo "Fix the fork (push upstream file), do NOT add a curl workaround here."
            echo ""
            echo "Quick fix:"
            echo "  git clone https://github.com/MujinnPark/AnyKernel3.git"
            echo "  cd AnyKernel3"
            echo "  curl -fsSL https://raw.githubusercontent.com/osm0sis/AnyKernel3/master/tools/ak3-core.sh -o tools/ak3-core.sh"
            echo "  git add tools/ak3-core.sh && git commit -m 'fix: restore complete ak3-core.sh' && git push"
            exit 1
          fi
          bash -n "$TARGET" || { echo "FATAL: ak3-core.sh has a syntax error"; exit 1; }
          echo "ak3-core.sh OK ($LINES lines, passes bash -n)"

      - name: Overlay PitchKernel AnyKernel3 files
        run: |
          AK3_BUILT="apasitu/anykernel"
          AK3_OURS="PitchKernel/anykernel"
          [ -d "$AK3_BUILT" ] || { echo "ERROR: $AK3_BUILT not found — build failed"; exit 1; }
          [ -d "$AK3_OURS"  ] || { echo "ERROR: $AK3_OURS not found — missing from repo"; exit 1; }

          echo "Overlaying PitchKernel anykernel files over cloned MujinnPark/AnyKernel3..."
          cp -v "$AK3_OURS/anykernel.sh" "$AK3_BUILT/anykernel.sh"
          mkdir -p "$AK3_BUILT/patch"
          cp -v "$AK3_OURS/patch/pitchkernel_cpufreq.sh" "$AK3_BUILT/patch/pitchkernel_cpufreq.sh"
          cp -v "$AK3_OURS/patch/pitchkernel_banking_prep.sh" "$AK3_BUILT/patch/pitchkernel_banking_prep.sh"
          cp -v "$AK3_OURS/patch/pitchkernel_sepolicy.sh" "$AK3_BUILT/patch/pitchkernel_sepolicy.sh"
          # PitchKernel: v2 scheduler/GPU tuning, added after the original
          # three files above. This list is hardcoded, not a directory copy,
          # so anykernel.sh's own install step (which does `cp
          # $AKHOME/patch/pitchkernel_v2_tuning.sh ...`) silently found nothing
          # to copy in flashed zips built before this line existed -- confirmed
          # via a real recovery.log showing "WARNING: could not write v2
          # tuning script to post-fs-data.d" on a build whose extracted file
          # list never included patch/pitchkernel_v2_tuning.sh at all. Keep
          # this list and anykernel.sh's install block in sync: adding a file
          # to PitchKernel/anykernel/patch/ does NOT automatically make it
          # into the built zip without an explicit line here.
          cp -v "$AK3_OURS/patch/pitchkernel_v2_tuning.sh" "$AK3_BUILT/patch/pitchkernel_v2_tuning.sh"
          chmod 755 "$AK3_BUILT/patch/pitchkernel_cpufreq.sh"
          chmod 755 "$AK3_BUILT/patch/pitchkernel_banking_prep.sh"
          chmod 755 "$AK3_BUILT/patch/pitchkernel_sepolicy.sh"
          chmod 755 "$AK3_BUILT/patch/pitchkernel_v2_tuning.sh"

          echo "Verifying overlaid files:"
          grep -m1 "PitchKernel by Mujinn" "$AK3_BUILT/anykernel.sh" \
            || { echo "ERROR: anykernel.sh does not look like our version"; exit 1; }
          grep -m1 "PitchKernel" "$AK3_BUILT/patch/pitchkernel_cpufreq.sh" \
            || { echo "ERROR: pitchkernel_cpufreq.sh missing expected content"; exit 1; }
          test -f "$AK3_BUILT/patch/pitchkernel_banking_prep.sh" \
            || { echo "ERROR: pitchkernel_banking_prep.sh was not overlaid"; exit 1; }
          test -f "$AK3_BUILT/patch/pitchkernel_v2_tuning.sh" \
            || { echo "ERROR: pitchkernel_v2_tuning.sh was not overlaid"; exit 1; }
          echo "Overlay complete."

      - name: Package zip
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="$(echo "${{ env.ROOT_PROVIDER }}" | tr '[:upper:]' '[:lower:]')-susfs"
            ARTIFACT_LABEL="$TYPE"
          else
            TYPE="stock"
            ARTIFACT_LABEL="stock"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV
          echo "ARTIFACT_LABEL=${ARTIFACT_LABEL}" >> $GITHUB_ENV

          AOSP_SRC_ZIP=$(find apasitu -maxdepth 1 -name "PitchKernel_AOSP_*.zip" | head -1)
          if [ -z "$AOSP_SRC_ZIP" ] || [ ! -f "$AOSP_SRC_ZIP" ]; then
            echo "ERROR: PitchKernel_AOSP_*.zip not found. Available zips:"
            find apasitu -maxdepth 1 -name "*.zip"
            exit 1
          fi
          echo "AOSP source: $AOSP_SRC_ZIP ($(du -sh $AOSP_SRC_ZIP | cut -f1))"

          # build.sh (the "AOSP+MIUI dual zip" path) also produces PitchKernel_MIUI_*.zip
          # with its own Image/dtb/dtbo.img — these are NOT interchangeable with the
          # AOSP ones (different config, different dtbo). Both must be present for
          # the dual-image AK3 flash pattern to actually work for MIUI/HyperOS users.
          MIUI_SRC_ZIP=$(find apasitu -maxdepth 1 -name "PitchKernel_MIUI_*.zip" | head -1)
          if [ -z "$MIUI_SRC_ZIP" ] || [ ! -f "$MIUI_SRC_ZIP" ]; then
            echo "ERROR: PitchKernel_MIUI_*.zip not found. Available zips:"
            find apasitu -maxdepth 1 -name "*.zip"
            echo "If you intentionally ran a build that skips MIUI, this packaging step"
            echo "needs a --skip-miui flag added — it currently assumes both zips exist."
            exit 1
          fi
          echo "MIUI source: $MIUI_SRC_ZIP ($(du -sh $MIUI_SRC_ZIP | cut -f1))"

          mkdir -p /tmp/kernel_files/aosp /tmp/kernel_files/miui
          unzip -q -j "$AOSP_SRC_ZIP" \
            "kernels/aosp/Image" \
            "kernels/aosp/dtb" \
            "kernels/aosp/dtbo.img" \
            -d /tmp/kernel_files/aosp/
          unzip -q -j "$MIUI_SRC_ZIP" \
            "kernels/miui/Image" \
            "kernels/miui/dtb" \
            "kernels/miui/dtbo.img" \
            -d /tmp/kernel_files/miui/

          for os in aosp miui; do
            for f in Image dtb dtbo.img; do
              if [ ! -f "/tmp/kernel_files/$os/$f" ]; then
                echo "ERROR: $f not found for $os"
                exit 1
              fi
            done
          done
          echo "Kernel files:"
          ls -lh /tmp/kernel_files/aosp /tmp/kernel_files/miui

          AK3_DIR="apasitu/anykernel"
          [ -d "$AK3_DIR" ] || { echo "ERROR: $AK3_DIR not found"; ls apasitu/; exit 1; }

          WORKDIR="/tmp/ak3_build"
          rm -rf "$WORKDIR"
          cp -r "$AK3_DIR" "$WORKDIR"

          CORE_LINES=$(wc -l < "$WORKDIR/tools/ak3-core.sh")
          UB_LINES=$(wc -l < "$WORKDIR/META-INF/com/google/android/update-binary")
          echo "ak3-core.sh in \$WORKDIR: $CORE_LINES lines"
          echo "update-binary in \$WORKDIR: $UB_LINES lines"
          [ "$CORE_LINES" -gt 900 ] || { echo "FATAL: ak3-core.sh truncated in WORKDIR"; exit 1; }
          bash -n "$WORKDIR/tools/ak3-core.sh" || { echo "FATAL: ak3-core.sh syntax error"; exit 1; }
          bash -n "$WORKDIR/META-INF/com/google/android/update-binary" || \
            { echo "FATAL: update-binary syntax error"; exit 1; }

          rm -rf "$WORKDIR/kernels"
          mkdir -p "$WORKDIR/kernels/aosp" "$WORKDIR/kernels/miui"
          cp /tmp/kernel_files/aosp/Image    "$WORKDIR/kernels/aosp/"
          cp /tmp/kernel_files/aosp/dtb      "$WORKDIR/kernels/aosp/"
          cp /tmp/kernel_files/aosp/dtbo.img "$WORKDIR/kernels/aosp/"
          cp /tmp/kernel_files/miui/Image    "$WORKDIR/kernels/miui/"
          cp /tmp/kernel_files/miui/dtb      "$WORKDIR/kernels/miui/"
          cp /tmp/kernel_files/miui/dtbo.img "$WORKDIR/kernels/miui/"

          [ -f "$WORKDIR/kernels/aosp/Image" ] || \
            { echo "ERROR: AOSP Image missing after copy"; exit 1; }
          [ -f "$WORKDIR/kernels/miui/Image" ] || \
            { echo "ERROR: MIUI Image missing after copy"; exit 1; }

          # Each ROM's own dtbo — do NOT cross-copy AOSP's dtbo to the MIUI slot or
          # vice versa, they come from different builds with different configs.
          cp /tmp/kernel_files/aosp/dtbo.img "$WORKDIR/munch-aosp-dtbo.img"
          cp /tmp/kernel_files/miui/dtbo.img "$WORKDIR/munch-miui-dtbo.img"

          ZIP_NAME="PitchKernel-${TYPE}-munch-${DATE}.zip"

          cd "$WORKDIR"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . \
            -x ".git/*" -x "*.gitignore" >/dev/null

          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME" | grep -q "kernels/aosp/Image" || \
            { echo "ERROR: kernels/aosp/Image missing from $ZIP_NAME"; exit 1; }
          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME" | grep -q "kernels/miui/Image" || \
            { echo "ERROR: kernels/miui/Image missing from $ZIP_NAME"; exit 1; }

          cd "$GITHUB_WORKSPACE"
          echo "Packaged: $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ env.ARTIFACT_LABEL }}-${{ github.run_number }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 7

      - name: Send artifact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
          ZIP_PATH: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
          KERNEL_VERSION: "4.19"
          ROOT_SOLUTION: ${{ inputs.ksu && env.ROOT_SOLUTION_KEY || 'VANILLA' }}
          SUSFS_ENABLED: ${{ inputs.ksu }}
          # Was hardcoded "default (apasitu)" — meant nothing and hid the exact
          # branch/commit mismatch bug fixed in the "Clone apasitu kernel source"
          # step above. Now reflects what was actually resolved and cloned this
          # run, so a future branch drift shows up in the Telegram message
          # instead of being invisible again.
          KERNEL_BRANCH: "${{ env.KERNEL_SOURCE_BRANCH }}@${{ env.KERNEL_SOURCE_SHA }}"
          COMPILER_STRING: "Neutron Clang 30062026"
          KERNEL_SRC: "apasitu"
        run: |
          source PitchKernel/release/telegram.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** MujinnPark/android_kernel_xiaomi_sm8250 @ `${{ env.KERNEL_SOURCE_BRANCH }}` (`${{ env.KERNEL_SOURCE_SHA }}`)
            **Toolchain:** Neutron Clang 30062026

            ### Features
            - ${{ env.ROOT_PROVIDER }} + SUSFS (${{ inputs.ksu && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - ROM auto-detection: MIUI/HyperOS or AOSP
            - CPU prime core ceiling: 2841600 kHz (hardware-enforced by qcom-cpufreq-hw driver)

            ### Installation
            Flash via OrangeFox or TWRP.
            Select ROM type during flash (auto-detected from zip name, volume-key fallback).
            cpufreq script placed in `/data/adb/post-fs-data.d/` automatically — no separate module needed.
          files: ${{ env.ZIP_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
