name: 🔨 Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build type'
        required: true
        default: 'sukisu'
        type: choice
        options:
          - sukisu
          - noksu
  push:
    tags:
      - 'v*'

env:
  KERNEL_SOURCE: https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git
  KERNEL_BRANCH: android16-aptusitu-new
  DEVICE: munch
  # Fragment-based config — confirmed from Termux:
  # arch/arm64/configs/vendor/kona_defconfig (base)
  # arch/arm64/configs/vendor/xiaomi/munch.config (device fragment)
  BASE_DEFCONFIG: vendor/kona_defconfig
  DEVICE_FRAGMENT: vendor/xiaomi/munch.config
  KERNEL_NAME: PitchKernel
  ANYKERNEL_SOURCE: https://github.com/kvsnr113/AnyKernel3.git
  ANYKERNEL_BRANCH: main
  # ZyCromerZ Clang 16 — same toolchain apasitu author uses (from their README)
  # Source: https://github.com/ZyCromerZ/Clang/releases
  CLANG_URL: https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz
  CLANG_DIR: zyc-clang
  TZ: UTC

jobs:
  build:
    name: Build PitchKernel — munch (SM8250)
    runs-on: ubuntu-22.04

    steps:
      - name: 📂 Checkout PitchKernel repo
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex \
            git libssl-dev libelf-dev lz4 make python3 python-is-python3 \
            unzip wget zip zstd ccache libarchive-tools

      - name: 🕒 Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 🔧 Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 5G
          key: pitchkernel-munch

      - name: 🛠️ Setup ZyCromerZ Clang 16
        run: |
          mkdir -p ${{ env.CLANG_DIR }}
          echo "Downloading ZyCromerZ Clang 16..."
          wget -q --show-progress \
            -O zyc-clang.tar.gz \
            "${{ env.CLANG_URL }}"
          tar -zxf zyc-clang.tar.gz -C ${{ env.CLANG_DIR }}
          rm zyc-clang.tar.gz
          echo "CLANG_PATH=$(pwd)/${{ env.CLANG_DIR }}/bin" >> $GITHUB_ENV
          echo "✅ $($(pwd)/${{ env.CLANG_DIR }}/bin/clang --version | head -1)"

      - name: 🧬 Clone kernel source (AstideLabs/apasitu)
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} \
            kernel_source
          cd kernel_source
          echo "KERNEL_VERSION=$(make kernelversion)" >> $GITHUB_ENV

      - name: 🔍 Verify config fragments
        run: |
          BASE="kernel_source/arch/arm64/configs/${{ env.BASE_DEFCONFIG }}"
          FRAG="kernel_source/arch/arm64/configs/${{ env.DEVICE_FRAGMENT }}"
          [ -f "$BASE" ] || { echo "❌ Missing base: $BASE"; exit 1; }
          [ -f "$FRAG" ] || { echo "❌ Missing fragment: $FRAG"; exit 1; }
          echo "✅ Base:     ${{ env.BASE_DEFCONFIG }}"
          echo "✅ Fragment: ${{ env.DEVICE_FRAGMENT }}"

      - name: 📥 Clone AnyKernel3 (kvsnr113/E404 fork)
        run: |
          git clone --depth=1 \
            -b ${{ env.ANYKERNEL_BRANCH }} \
            ${{ env.ANYKERNEL_SOURCE }} \
            AnyKernel3
          # Replace with PitchKernel's anykernel.sh (freq profile selector)
          cp anykernel.sh AnyKernel3/anykernel.sh

      - name: 🔨 Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC="ccache clang"
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabihf-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export KBUILD_BUILD_USER=PitchDev
          export KBUILD_BUILD_HOST=PitchKernel

          cd kernel_source
          mkdir -p out

          echo "⚙️ Step 1: Generate base config (kona_defconfig)..."
          make O=out ARCH=arm64 ${{ env.BASE_DEFCONFIG }}

          echo "⚙️ Step 2: Merge munch device fragment..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/${{ env.DEVICE_FRAGMENT }}

          echo "⚙️ Step 3: Resolve all symbols (olddefconfig)..."
          make O=out ARCH=arm64 olddefconfig

          echo "⚙️ Step 4: Inject PitchKernel localversion..."
          ./scripts/config --file out/.config \
            --set-str LOCALVERSION "-PitchKernel-munch"

          echo "🔨 Building kernel ($(nproc) threads)..."
          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            2>&1 | tee ../build.log

          [ -f out/arch/arm64/boot/Image ] || \
            { echo "❌ Build failed — Image not found"; exit 1; }
          echo "✅ Build successful!"

      - name: 📦 Package flashable zip
        run: |
          BUILD_TYPE="${{ github.event.inputs.BUILD_TYPE || 'sukisu' }}"
          ZIP_NAME="${{ env.KERNEL_NAME }}-${BUILD_TYPE}-munch-${{ env.BUILD_DATE }}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          cp kernel_source/out/arch/arm64/boot/Image AnyKernel3/
          [ -f kernel_source/out/arch/arm64/boot/dtbo.img ] && \
            cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f kernel_source/out/arch/arm64/boot/dtb ] && \
            cp kernel_source/out/arch/arm64/boot/dtb AnyKernel3/

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "README.md"
          cd ..
          echo "📦 $(du -sh ${ZIP_NAME})"

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ZIP_NAME }}
            build.log
          retention-days: 7

      - name: 🚀 Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.ZIP_NAME }},build.log
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "PitchKernel ${{ github.ref_name }} — munch"
          body: |
            ## ⚡ PitchKernel ${{ github.ref_name }}
            **Device:** Poco F4 / Redmi K40S (munch) — SM8250
            **Kernel:** ${{ env.KERNEL_VERSION }}-PitchKernel-munch
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250 @ `android16-aptusitu-new`
            **Config:** vendor/kona_defconfig + vendor/xiaomi/munch.config
            **Toolchain:** ZyCromerZ Clang 16.0.6
            **AnyKernel3:** kvsnr113/AnyKernel3
            **Built:** ${{ env.BUILD_DATE }}
            **Type:** ${{ github.event.inputs.BUILD_TYPE || 'sukisu' }}

            ### CPU Frequency Profiles (selected during flash)
            | Profile | Silver cpu0-3 | Gold cpu4-6 | Prime cpu7 |
            |---|---|---|---|
            | Overclock | 1804 MHz | 3000 MHz | 3072 MHz |
            | Stable | 1804 MHz | 2419 MHz | 2841 MHz |
            | Battery | 1516 MHz | 1804 MHz | 2419 MHz |

            ### Root support
            - **sukisu:** ReSukiSU + SUSFS
            - **noksu:** Magisk / APatch

            ### Install
            Flash via TWRP or OrangeFox. Select CPU frequency profile during flash.
            Supports Android 11–16 (MIUI/HyperOS + AOSP ROMs).
          draft: false
          prerelease: false
          
