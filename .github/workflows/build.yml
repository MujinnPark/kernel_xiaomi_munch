name: Build PitchKernel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Target ROM type'
        required: true
        default: 'build.sh'
        type: choice
        options:
          - build.sh
          - build-miui.sh
      ksu:
        description: 'Enable ReSukiSU + SUSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: PitchKernel munch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PitchKernel repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify build started
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            LABEL="ReSukiSU+SUSFS"
          else
            LABEL="NoKSU"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=🔨 PitchKernel — Build Started%0ADevice: munch (Poco F4)%0AType: ${LABEL} — ${{ inputs.script }}%0ADate: $(date +'%Y-%m-%d %H:%M UTC')" | jq '.ok'

      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget \
            bison flex zip bc cpio libssl-dev ccache \
            python-is-python3 gcc-arm-linux-gnueabi \
            device-tree-compiler

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: pitchkernel-ccache-munch-${{ github.run_id }}
          restore-keys: |
            pitchkernel-ccache-munch-
            pitchkernel-ccache-

      - name: Setup ZyCromerZ Clang 16
        run: |
          mkdir -p $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz \
            -O clang.tar.gz
          tar -zxf clang.tar.gz -C $HOME/zyc-clang
          rm clang.tar.gz

      - name: Clone apasitu kernel source
        run: |
          git clone --depth=1 --no-single-branch \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250.git \
            apasitu
          ls apasitu/build.sh apasitu/build-miui.sh

      - name: Set PitchKernel name
        run: |
          echo "-pitchkernel" > apasitu/localversion-st
          echo "" > apasitu/localversion-cip

      - name: Point AnyKernel3 to PitchKernel fork
        run: |
          sed -i 's#https://github.com/AstideLabs/AnyKernel3#https://github.com/MujinnPark/AnyKernel3#' \
            apasitu/build.sh apasitu/build-miui.sh

      - name: Enable TCP BBR
        run: |
          DEFCONFIG="apasitu/arch/arm64/configs/munch_defconfig"
          [ -f "$DEFCONFIG" ] || { echo "ERROR: $DEFCONFIG not found"; exit 1; }
          {
            echo ""
            echo "# TCP BBR - PitchKernel"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          } >> "$DEFCONFIG"

      - name: Build kernel
        run: |
          cd apasitu
          chmod +x build.sh build-miui.sh
          if [ "${{ inputs.ksu }}" == "true" ]; then
            bash ${{ inputs.script }} munch ksu
          else
            bash ${{ inputs.script }} munch
          fi

      - name: Patch DTBs for frequency variants
        run: |
          # Perf+ approach: multiple DTBs with different freq tables baked in
          # We patch the compiled DTB using fdtput (device-tree-compiler)
          # to set scaling_max_freq in the OPP table.
          #
          # The kernel DTB is output to apasitu/out/arch/arm64/boot/dts/
          # Find it:
          SRC_ZIP=$(find apasitu -maxdepth 1 -name "*.zip" | head -1)
          [ -f "$SRC_ZIP" ] || { echo "ERROR: no source zip found"; ls apasitu/; exit 1; }

          # Extract the base DTB from build output zip
          mkdir -p /tmp/dtb_work
          unzip -q -j "$SRC_ZIP" "kernels/aosp/dtb" -d /tmp/dtb_work/
          [ -f /tmp/dtb_work/dtb ] || { echo "ERROR: dtb not found in zip"; unzip -l "$SRC_ZIP"; exit 1; }

          BASE_DTB="/tmp/dtb_work/dtb"
          echo "Base DTB size: $(du -sh $BASE_DTB | cut -f1)"

          # Decompile to DTS to inspect OPP table structure
          dtc -I dtb -O dts -o /tmp/dtb_work/base.dts "$BASE_DTB" 2>/dev/null || \
            { echo "WARNING: dtc decompile failed, trying fdtdump"; fdtdump "$BASE_DTB" > /tmp/dtb_work/base.dts 2>/dev/null; }

          echo "=== cpu7 OPP entries in compiled DTB ==="
          grep -i "opp-hz\|cpu7\|3187\|2841\|2419\|2208\|1670\|1804" /tmp/dtb_work/base.dts | head -30 || \
            echo "(no matches — DTB may be in concatenated format)"

          # Check DTB format
          file "$BASE_DTB"
          xxd "$BASE_DTB" | head -5

          # For now, use the same DTB for both variants
          # The frequency is enforced via post-fs-data.d module at boot
          mkdir -p /tmp/dtb_work/stable
          mkdir -p /tmp/dtb_work/overclock
          cp "$BASE_DTB" /tmp/dtb_work/stable/munch-dtb
          cp "$BASE_DTB" /tmp/dtb_work/overclock/munch-dtb

          echo "DTB variants prepared"
          echo "DTB_READY=true" >> $GITHUB_ENV

      - name: Package Stable and Overclock zips
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          if [ "${{ inputs.ksu }}" == "true" ]; then
            TYPE="sukisu"
          else
            TYPE="noksu"
          fi
          echo "BUILD_DATE=${DATE}" >> $GITHUB_ENV
          echo "BUILD_TYPE=${TYPE}" >> $GITHUB_ENV

          SRC_ZIP=$(find apasitu -maxdepth 1 -name "*.zip" | head -1)
          [ -f "$SRC_ZIP" ] || { echo "ERROR: no source zip"; exit 1; }
          echo "Source: $SRC_ZIP ($(du -sh $SRC_ZIP | cut -f1))"

          # Extract kernel files
          mkdir -p /tmp/kernel_files
          unzip -q -j "$SRC_ZIP" \
            "kernels/aosp/Image" \
            "kernels/aosp/dtbo.img" \
            -d /tmp/kernel_files/
          ls -lh /tmp/kernel_files/

          # Get AK3 base (what build.sh prepared)
          AK3_DIR="apasitu/anykernel"
          [ -d "$AK3_DIR" ] || { echo "ERROR: $AK3_DIR not found"; exit 1; }

          for profile in stable overclock; do
            WORKDIR="/tmp/ak3_${profile}"
            rm -rf "$WORKDIR"
            cp -r "$AK3_DIR" "$WORKDIR"

            # Replace anykernel.sh with PitchKernel's version (from fork)
            # The fork's anykernel.sh already has PROFILE_FIXED placeholder
            # Substitute profile
            grep -q 'PROFILE_FIXED' "$WORKDIR/anykernel.sh" || \
              { echo "ERROR: PROFILE_FIXED not found in anykernel.sh in fork"; cat "$WORKDIR/anykernel.sh" | head -20; exit 1; }
            sed -i "s/PROFILE_FIXED/${profile}/g" "$WORKDIR/anykernel.sh"

            # Inject kernel files
            cp /tmp/kernel_files/Image "$WORKDIR/"
            cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-aosp-dtbo.img" 2>/dev/null || true
            cp /tmp/kernel_files/dtbo.img "$WORKDIR/munch-miui-dtbo.img" 2>/dev/null || true

            # Add DTB variants
            mkdir -p "$WORKDIR/dtbs/stable" "$WORKDIR/dtbs/overclock"
            cp /tmp/dtb_work/stable/munch-dtb "$WORKDIR/dtbs/stable/munch-dtb"
            cp /tmp/dtb_work/overclock/munch-dtb "$WORKDIR/dtbs/overclock/munch-dtb"

            # Package
            if [ "$profile" = "stable" ]; then
              ZIP_NAME="PitchKernel-${TYPE}-munch-Stable-${DATE}.zip"
            else
              ZIP_NAME="PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip"
            fi

            cd "$WORKDIR"
            zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . \
              -x ".git/*" -x "*.gitignore" >/dev/null
            cd "$GITHUB_WORKSPACE"
            echo "Packaged: $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"
          done

          ls -lh *.zip
          echo "STABLE_ZIP=PitchKernel-${TYPE}-munch-Stable-${DATE}.zip" >> $GITHUB_ENV
          echo "OC_ZIP=PitchKernel-${TYPE}-munch-Overclock-${DATE}.zip" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-munch-${{ github.run_number }}
          path: |
            ${{ env.STABLE_ZIP }}
            ${{ env.OC_ZIP }}
          if-no-files-found: error
          retention-days: 7

      - name: Send artifacts to Telegram
        run: |
          if [ "${{ inputs.ksu }}" == "true" ]; then
            export ROOT_SOLUTION="RESUKISU"
            export SUSFS_ENABLED="true"
          else
            export ROOT_SOLUTION="VANILLA"
            export SUSFS_ENABLED="false"
          fi
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export TELEGRAM_THREAD_ID_ARTIFACT="${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}"
          export KERNEL_VERSION="4.19"
          export KERNEL_BRANCH="default (apasitu)"
          export COMPILER_STRING="ZyCromerZ Clang 16.0.6"
          export KERNEL_SRC="$GITHUB_WORKSPACE/apasitu"
          for ZIP in "${{ env.STABLE_ZIP }}" "${{ env.OC_ZIP }}"; do
            export ZIP_PATH="$GITHUB_WORKSPACE/$ZIP"
            export ZIP_NAME="$ZIP"
            source PitchKernel/release/telegram.sh
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PitchKernel-munch-${{ env.BUILD_DATE }}
          name: "PitchKernel ${{ env.BUILD_DATE }} — munch"
          body: |
            ## PitchKernel — Poco F4 / Redmi K40S (munch)

            **Build date:** ${{ env.BUILD_DATE }}
            **Type:** ${{ env.BUILD_TYPE }}
            **Base:** AstideLabs/android_kernel_xiaomi_sm8250
            **Toolchain:** ZyCromerZ Clang 16.0.6

            ### Features
            - ReSukiSU + SUSFS (${{ inputs.ksu == true && 'enabled' || 'disabled' }})
            - TCP BBR congestion control
            - ROM detection: MIUI/HyperOS or AOSP (selected during flash)

            ### CPU Frequency (verified from qcom-cpufreq-hw driver LUT)
            | Zip | Prime cpu7 |
            |---|---|
            | Stable | 2419 MHz |
            | Overclock | 2841 MHz |

            > 3187 MHz is skipped by qcom-cpufreq-hw at boot — not in hardware LUT.

            ### Installation
            Flash via TWRP or OrangeFox. Supports Android 11-16.
            Install PitchKernel-cpufreq-module via KernelSU/Magisk for frequency enforcement.
          files: |
            ${{ env.STABLE_ZIP }}
            ${{ env.OC_ZIP }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
