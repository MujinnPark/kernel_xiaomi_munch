name: Notify

on:
  push:
  workflow_run:
    workflows: ["Build PitchKernel"]
    types: [completed]

jobs:
  on-push:
    name: Push Notify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Notify Push
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          TITLE=$(echo "${{ github.event.head_commit.message }}" | head -1)
          TEXT="${SHORT} pushed to ${{ github.ref_name }} by ${{ github.event.head_commit.author.name }}%0A${TITLE}%0A%0ARepo: https://github.com/${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=${TEXT}" | jq '.ok'

  on-build:
    name: Build Notify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Notify Build Result
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          if [ "$CONCLUSION" = "success" ]; then
            TEXT="✅ PitchKernel build succeeded%0ADevice: munch (Poco F4)%0ADate: $(date +'%Y-%m-%d %H:%M UTC')%0ARun: ${RUN_URL}"
          else
            TEXT="❌ PitchKernel build failed%0ADevice: munch (Poco F4)%0ADate: $(date +'%Y-%m-%d %H:%M UTC')%0ARun: ${RUN_URL}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_THREAD_ID_EVENT }}" \
            -d "disable_web_page_preview=true" \
            -d "text=${TEXT}" | jq '.ok'
            
